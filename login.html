<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>willCoin Capital Login</title>
<style>
    body {
        background: #000;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    /* COMPACT 3-STEP FLOW */
    .workflow {
        display: flex;
        justify-content: space-between;
        width: 320px;
        margin-bottom: 30px;
        text-align: center;
        animation: fadeIn 0.8s ease-out;
    }

    .step { flex: 1; padding: 0 5px; }

    .step-num {
        font-size: 10px;
        font-weight: 800;
        color: #19d3ff;
        display: block;
        margin-bottom: 4px;
        text-transform: uppercase;
    }

    .step-label {
        font-size: 11px;
        font-weight: 700;
        display: block;
        margin-bottom: 2px;
    }

    .step-desc {
        font-size: 9px;
        color: #6b7280;
        line-height: 1.2;
    }

    /* LOGIN BOX */
    .login-box {
        background: #111827;
        padding: 40px;
        border-radius: 24px;
        width: 300px;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        border: 1px solid rgba(255,255,255,0.05);
    }

    h2 { margin: 0 0 5px 0; font-size: 22px; font-weight: 900; }
    h2 span { color: #19d3ff; }
    p.subtitle { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; }

    input {
        width: 100%;
        padding: 14px;
        margin-top: 12px;
        border: none;
        border-radius: 10px;
        background: #0b0f1a;
        color: white;
        box-sizing: border-box;
        font-size: 13px;
    }

    button {
        width: 100%;
        padding: 14px;
        margin-top: 20px;
        background: #19d3ff;
        border: none;
        border-radius: 10px;
        font-weight: 800;
        text-transform: uppercase;
        color: #0b0f1a;
        cursor: pointer;
    }

    .signup-link { margin-top: 20px; font-size: 12px; color: #6b7280; }
    .signup-link a { color: #19d3ff; text-decoration: none; font-weight: bold; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<div class="workflow">
    <div class="step">
        <span class="step-num">01</span>
        <span class="step-label">Deposit</span>
        <span class="step-desc">Fund via BTC</span>
    </div>
    <div class="step" style="border-left: 1px solid rgba(255,255,255,0.1); border-right: 1px solid rgba(255,255,255,0.1);">
        <span class="step-num">02</span>
        <span class="step-label">Stake</span>
        <span class="step-desc">Set your cycle</span>
    </div>
    <div class="step">
        <span class="step-num">03</span>
        <span class="step-label">Yield</span>
        <span class="step-desc">50% in 7 days</span>
    </div>
</div>

<div class="login-box">
    <h2>WILLCOIN<span>CAPITAL</span></h2>
    <p class="subtitle">Secure Member Login</p>

    <input type="text" id="username" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p class="signup-link">
        New User? <a href="signup.html">Create Account</a>
    </p>
</div>

<script src="auth.js"></script>

</body>
</html>
