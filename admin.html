<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>willCoin | ROOT TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    <style>
        body { background:#000; font-family:'Plus Jakarta Sans',sans-serif; color: white; margin: 0; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(20px); }
        .neo-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .neo-btn { background: #22d3ee; color: #000; font-weight: 900; transition: 0.3s; }
        .neo-btn:hover { background: #fff; transform: scale(1.02); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen p-6">

    <div id="authGate" class="flex items-center justify-center min-h-[90vh]">
        <div class="glass p-10 rounded-[40px] w-full max-w-sm text-center">
            <div class="w-16 h-16 bg-cyan-400 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-lg shadow-cyan-500/20">
                <svg class="w-8 h-8 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h1 class="text-xs font-black uppercase tracking-[0.4em] text-cyan-400 mb-8">System Authorization</h1>
            
            <div id="loginFields" class="space-y-4">
                <input type="email" id="adminEmail" placeholder="ADMIN EMAIL" class="w-full neo-input rounded-2xl py-4 px-6 text-xs font-bold uppercase tracking-widest outline-none focus:border-cyan-400 text-white">
                <input type="password" id="adminPass" placeholder="PASSWORD" class="w-full neo-input rounded-2xl py-4 px-6 text-xs font-bold uppercase tracking-widest outline-none focus:border-cyan-400 text-white">
                <button onclick="handleLogin()" class="w-full py-5 neo-btn rounded-2xl text-xs uppercase tracking-widest">Sign In</button>
            </div>

            <div id="pinFields" class="hidden space-y-4">
                <p class="text-[10px] text-white/40 uppercase font-black mb-2">Identity Confirmed • Enter PIN</p>
                <input type="password" id="pinField" placeholder="••••••" class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 text-center text-2xl font-black outline-none focus:border-cyan-400 text-white tracking-[0.5em]">
                <button onclick="verifyPin()" class="w-full py-5 neo-btn rounded-2xl text-xs uppercase tracking-widest">Access Root</button>
            </div>
        </div>
    </div>

    <div id="mainDashboard" class="hidden max-w-6xl mx-auto py-10">
        <header class="flex justify-between items-end mb-12">
            <div>
                <h2 class="text-cyan-400 text-[10px] font-black uppercase tracking-[0.5em]">Root Session Active</h2>
                <h1 class="text-5xl font-black tracking-tighter uppercase">willCoin <span class="opacity-20">HQ</span></h1>
            </div>
            <button onclick="logout()" class="text-[9px] font-black uppercase bg-red-500/10 text-red-500 border border-red-500/20 px-6 py-3 rounded-full hover:bg-red-500 hover:text-white transition-all">Terminate Session</button>
        </header>

        <div class="glass rounded-[40px] overflow-hidden border border-white/5">
            <table class="w-full text-left">
                <thead class="bg-white/5 border-b border-white/5 text-[9px] font-black text-white/30 uppercase tracking-widest">
                    <tr><th class="p-8">Account Email</th><th class="p-8 text-center">Current Balance</th><th class="p-8 text-right">Terminal Control</th></tr>
                </thead>
                <tbody id="userTable" class="divide-y divide-white/5"></tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDsY7hDvNEDq_8SE0XcHrgLU5e6kQxpMPA", 
            authDomain: "willcoincapital.firebaseapp.com", 
            projectId: "willcoincapital", 
            storageBucket: "willcoincapital.firebasestorage.app", 
            messagingSenderId: "241566024834", 
            appId: "1:241566024834:web:75e0d771ca7eb9a5a3a09b" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const MASTER_UID = "N3WmHdg3RUSLOQrsnkyslswwYOC3"; 
        const MASTER_PIN = "555888"; 

        async function handleLogin() {
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, pass);
                if (userCredential.user.uid === MASTER_UID) {
                    document.getElementById('loginFields').classList.add('hidden');
                    document.getElementById('pinFields').classList.remove('hidden');
                } else {
                    alert("Unauthorized Access. This account does not have Root privileges.");
                    auth.signOut();
                }
            } catch(e) { alert(e.message); }
        }

        function verifyPin() {
            if(document.getElementById('pinField').value === MASTER_PIN) {
                sessionStorage.setItem('admin_verified', 'true');
                showPanel();
            } else { alert("Invalid Security PIN"); }
        }

        function showPanel() {
            document.getElementById('authGate').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            loadUsers();
        }

        function loadUsers() {
            db.collection('users').onSnapshot(snap => {
                const table = document.getElementById('userTable');
                table.innerHTML = "";
                snap.forEach(doc => {
                    const u = doc.data();
                    table.innerHTML += `
                        <tr class="hover:bg-white/[0.02] transition-all">
                            <td class="p-8">
                                <div class="font-bold text-sm text-white">${u.email}</div>
                                <div class="text-[8px] text-white/20 mt-1 font-mono uppercase">${doc.id}</div>
                            </td>
                            <td class="p-8 text-center font-black text-2xl text-cyan-400 tracking-tighter">$${(u.balance || 0).toLocaleString()}</td>
                            <td class="p-8 text-right space-x-3">
                                <button onclick="adjustBalance('${doc.id}')" class="bg-white/5 border border-white/10 px-4 py-2 rounded-xl text-[8px] font-black uppercase hover:border-cyan-400 transition-all">Edit Balance</button>
                                <button onclick="purgeUser('${doc.id}')" class="text-red-500 text-[8px] font-black uppercase">Purge</button>
                            </td>
                        </tr>`;
                });
            }, err => { alert("Database error. Ensure Firebase Rules are published."); });
        }

        async function adjustBalance(id) {
            const amt = prompt("Input new absolute balance:");
            if(amt !== null) await db.collection('users').doc(id).update({ balance: parseFloat(amt) });
        }

        async function purgeUser(id) {
            if(confirm("Confirm account deletion? This action is permanent.")) {
                await db.collection('users').doc(id).delete();
            }
        }

        function logout() { sessionStorage.clear(); auth.signOut(); location.reload(); }

        auth.onAuthStateChanged(user => {
            if(user && user.uid === MASTER_UID && sessionStorage.getItem('admin_verified') === 'true') {
                showPanel();
            }
        });
    </script>
</body>
</html>
