<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>willCoin | Master Admin HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { background:#050505; font-family:'Plus Jakarta Sans',sans-serif; color: white; min-height: 100vh; }
        .glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(12px); }
        .hidden { display: none !important; }
        .btn-cyan { background: #22d3ee; color: black; font-weight: 900; transition: all 0.2s; }
        .btn-cyan:hover { background: white; transform: translateY(-2px); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="loginGate" class="flex flex-col items-center justify-center min-h-[80vh]">
        <div class="glass p-10 rounded-[40px] text-center w-full max-w-sm border border-white/5">
            <div class="w-16 h-16 bg-cyan-400 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-[0_0_30px_rgba(34,211,238,0.3)]">
                <svg class="w-8 h-8 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h2 class="font-black uppercase text-[10px] tracking-[0.3em] mb-4 text-cyan-400">Master Terminal</h2>
            
            <button onclick="quickFill()" class="mb-6 block mx-auto text-[9px] font-black uppercase text-white/20 hover:text-cyan-400 transition-colors border border-white/5 px-4 py-2 rounded-full">
                [ Use Master Email Shortcut ]
            </button>

            <input type="password" id="adminPin" placeholder="ENTER ACCESS PIN" class="w-full bg-white/5 rounded-2xl py-5 text-center text-xl font-black mb-4 outline-none border border-white/10 focus:border-cyan-400 transition-all tracking-widest text-white">
            <button onclick="checkPin()" class="w-full py-5 btn-cyan rounded-2xl font-black uppercase text-xs tracking-widest active:scale-95">Authorize Access</button>
        </div>
    </div>

    <div id="adminContent" class="hidden max-w-6xl mx-auto space-y-10">
        <div class="flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-center md:text-left">
                <p class="text-cyan-400 text-[10px] font-black uppercase tracking-[0.4em] mb-1">Root Access Active</p>
                <h1 class="text-4xl font-black uppercase tracking-tighter">willCoin <span class="text-white/20">HQ</span></h1>
            </div>
            <div class="flex gap-4">
                <button onclick="applyDailyProfit()" class="bg-white/5 border border-cyan-400/30 text-cyan-400 text-[10px] font-black uppercase px-6 py-3 rounded-full hover:bg-cyan-400 hover:text-black transition-all">⚡ Inject Profit (7.1%)</button>
                <button onclick="handleLogout()" class="text-[10px] font-black uppercase text-white/40 bg-white/5 px-6 py-3 rounded-full border border-white/5 hover:bg-red-500 hover:text-white transition-all">Logout</button>
            </div>
        </div>

        <div class="glass rounded-[40px] overflow-hidden border border-white/5">
            <table class="w-full text-left">
                <thead class="bg-white/5 uppercase text-[9px] font-black text-gray-500 border-b border-white/5">
                    <tr>
                        <th class="p-6">Account</th>
                        <th class="p-6">Balance</th>
                        <th class="p-6 text-right">Control</th>
                    </tr>
                </thead>
                <tbody id="userList" class="divide-y divide-white/5"></tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDsY7hDvNEDq_8SE0XcHrgLU5e6kQxpMPA", 
            authDomain: "willcoincapital.firebaseapp.com", 
            projectId: "willcoincapital", 
            storageBucket: "willcoincapital.firebasestorage.app", 
            messagingSenderId: "241566024834", 
            appId: "1:241566024834:web:75e0d771ca7eb9a5a3a09b" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        const ADMIN_PIN = "555888"; 
        const MASTER_UID = "N3WmHdg3RUSLOQrsnkyslswwYOC3"; 
        const MASTER_EMAIL = "FATUROTITOYOSI@GMAIL.COM"; // UPDATED MASTER EMAIL

        function quickFill() {
            const pass = prompt("Enter password for " + MASTER_EMAIL);
            if (pass) {
                // We force uppercase here just in case Firebase is case-sensitive
                auth.signInWithEmailAndPassword(MASTER_EMAIL, pass)
                    .then(() => alert("Master Authenticated. Enter PIN."))
                    .catch(err => alert("Error: " + err.message));
            }
        }

        auth.onAuthStateChanged(user => {
            if (user && user.uid === MASTER_UID && localStorage.getItem('admin_session') === 'active') {
                document.getElementById('loginGate').classList.add('hidden');
                document.getElementById('adminContent').classList.remove('hidden');
                syncData();
            }
        });

        function checkPin() {
            if (document.getElementById('adminPin').value === ADMIN_PIN) {
                localStorage.setItem('admin_session', 'active');
                if (auth.currentUser && auth.currentUser.uid === MASTER_UID) {
                    location.reload();
                } else {
                    alert("PIN OK. Click the Shortcut to Login.");
                }
            } else { alert("INVALID PIN"); }
        }

        function syncData() {
            db.collection('users').onSnapshot(snap => {
                const list = document.getElementById('userList');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const u = doc.data();
                    list.innerHTML += `<tr>
                        <td class="p-6 font-bold text-sm">${u.email}</td>
                        <td class="p-6 font-black text-cyan-400 text-xl">$${(u.balance || 0).toLocaleString()}</td>
                        <td class="p-6 text-right"><button onclick="deleteAcc('${doc.id}')" class="text-red-500 font-black text-[9px] uppercase">Delete</button></td>
                    </tr>`;
                });
            }, err => {
                alert("Database Locked. Make sure you published your Firebase Rules!");
            });
        }

        function handleLogout() { localStorage.removeItem('admin_session'); auth.signOut(); location.reload(); }
        async function deleteAcc(id) { if(confirm("Delete User?")) await db.collection('users').doc(id).delete(); }
    </script>
</body>
</html>
