<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>willCoin Admin | Master Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { background:#050505; font-family:'Plus Jakarta Sans',sans-serif; color: white; }
        .glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(12px); }
        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        .btn-danger { border: 1px solid rgba(239, 68, 68, 0.2); color: #ef4444; }
        .btn-danger:hover { background: #ef4444; color: white; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div id="loginGate" class="glass p-10 rounded-[40px] text-center w-full max-w-sm border border-white/5">
        <div class="w-12 h-12 bg-cyan-400 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-[0_0_20px_rgba(34,211,238,0.3)]">
            <svg class="w-6 h-6 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>
        <h2 class="font-black uppercase text-[10px] tracking-widest mb-6 text-white/40">Master Terminal</h2>
        <input type="password" id="adminPin" placeholder="••••••" class="w-full bg-white/5 rounded-2xl py-4 text-center text-2xl font-bold mb-4 outline-none border border-white/10 focus:border-cyan-400 transition-all text-cyan-400">
        <button onclick="checkPin()" class="w-full py-4 bg-cyan-400 text-black rounded-2xl font-black uppercase text-[11px] hover:bg-white transition-all active:scale-95">Authorize</button>
    </div>

    <div id="adminContent" class="hidden w-full max-w-6xl space-y-10 py-10">
        
        <div class="flex justify-between items-end px-2">
            <div>
                <p class="text-cyan-400 text-[10px] font-black uppercase tracking-widest mb-1">Root Access Active</p>
                <h1 class="text-3xl font-black uppercase">willCoin <span class="text-white/20 text-xl ml-2">HQ</span></h1>
            </div>
            <button onclick="handleLogout()" class="text-[10px] font-black uppercase text-white/40 hover:text-white bg-white/5 px-4 py-2 rounded-full">Secure Logout</button>
        </div>

        <section>
            <h2 class="text-sm font-black uppercase mb-4 px-2 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></span>
                Verification Queue
            </h2>
            <div class="glass rounded-[32px] overflow-hidden border border-white/5">
                <table class="w-full text-left">
                    <thead class="bg-white/5 uppercase text-[9px] font-black text-gray-500">
                        <tr>
                            <th class="p-5">User Account</th>
                            <th class="p-5">Details</th>
                            <th class="p-5 text-center">Amount</th>
                            <th class="p-5 text-right">Decision</th>
                        </tr>
                    </thead>
                    <tbody id="adminQueue"></tbody>
                </table>
            </div>
        </section>

        <section>
            <h2 class="text-sm font-black uppercase mb-4 px-2">Global User Directory</h2>
            <div class="glass rounded-[32px] overflow-hidden border border-white/5">
                <table class="w-full text-left">
                    <thead class="bg-white/5 uppercase text-[9px] font-black text-gray-500">
                        <tr>
                            <th class="p-5">Account</th>
                            <th class="p-5">Balance</th>
                            <th class="p-5 text-right">Account Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userList"></tbody>
                </table>
            </div>
        </section>

    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDsY7hDvNEDq_8SE0XcHrgLU5e6kQxpMPA",
            authDomain: "willcoincapital.firebaseapp.com",
            projectId: "willcoincapital",
            storageBucket: "willcoincapital.firebasestorage.app",
            messagingSenderId: "241566024834",
            appId: "1:241566024834:web:75e0d771ca7eb9a5a3a09b"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const ADMIN_PIN = "555888"; 

        // AUTO-LOGIN CHECK ON LOAD
        window.onload = function() {
            if (localStorage.getItem('admin_session') === 'active') {
                showAdminPanel();
            }
        };

        function checkPin() {
            if (document.getElementById('adminPin').value === ADMIN_PIN) {
                localStorage.setItem('admin_session', 'active');
                showAdminPanel();
            } else { 
                alert("ACCESS DENIED"); 
            }
        }

        function showAdminPanel() {
            document.getElementById('loginGate').classList.add('hidden');
            document.getElementById('adminContent').classList.remove('hidden');
            syncData();
        }

        function handleLogout() {
            localStorage.removeItem('admin_session');
            location.reload();
        }

        function syncData() {
            db.collection('users').onSnapshot(snap => {
                const queueBox = document.getElementById('adminQueue');
                const userBox = document.getElementById('userList');
                
                queueBox.innerHTML = "";
                userBox.innerHTML = "";
                let pendingCount = 0;

                snap.forEach(doc => {
                    const user = doc.data();
                    const uid = doc.id;
                    const history = user.history || [];

                    history.forEach((tx, index) => {
                        if (tx.status === "Verifying") {
                            pendingCount++;
                            queueBox.innerHTML += `
                                <tr class="border-b border-white/5 hover:bg-white/[0.01]">
                                    <td class="p-5">
                                        <div class="text-sm font-bold text-white">${user.email}</div>
                                        <div class="text-[9px] text-white/20 font-mono">${uid}</div>
                                    </td>
                                    <td class="p-5">
                                        <div class="text-[10px] font-mono text-gray-500 mb-1">${tx.id}</div>
                                        <div class="inline-block px-2 py-0.5 rounded text-[8px] font-black uppercase bg-cyan-400/10 text-cyan-400">
                                            Pending Verification
                                        </div>
                                    </td>
                                    <td class="p-5 font-black text-center text-xl">$${(tx.amount || 0).toLocaleString()}</td>
                                    <td class="p-5 text-right">
                                        <div class="flex gap-2 justify-end">
                                            <button onclick="approveDeposit('${uid}', ${index}, ${tx.amount})" class="bg-cyan-400 text-black px-4 py-2 rounded-xl text-[9px] font-black uppercase transition active:scale-95">Approve</button>
                                            <button onclick="rejectDeposit('${uid}', ${index})" class="border border-red-500 text-red-500 px-4 py-2 rounded-xl text-[9px] font-black uppercase hover:bg-red-500 hover:text-white transition active:scale-95">Reject</button>
                                        </div>
                                    </td>
                                </tr>`;
                        }
                    });

                    userBox.innerHTML += `
                        <tr class="border-b border-white/5">
                            <td class="p-5">
                                <div class="text-sm font-bold text-white">${user.email || 'Anonymous'}</div>
                                <div class="text-[9px] text-white/20 font-mono">${uid}</div>
                            </td>
                            <td class="p-5 font-black">
                                <div class="text-cyan-400 text-lg">$${(user.balance || 0).toLocaleString()}</div>
                            </td>
                            <td class="p-5 text-right space-x-1">
                                <button onclick="editBalance('${uid}')" class="border border-white/10 text-white/40 px-3 py-1.5 rounded-lg text-[8px] font-black uppercase hover:border-cyan-400 hover:text-cyan-400">Edit Bal</button>
                                <button onclick="deleteAccount('${uid}')" class="btn-danger px-3 py-1.5 rounded-lg text-[8px] font-black uppercase">Delete</button>
                            </td>
                        </tr>`;
                });

                if (pendingCount === 0) {
                    queueBox.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-white/20 uppercase text-[10px]">No Pending Deposits</td></tr>';
                }
            });
        }

        async function approveDeposit(uid, index, amt) {
            if (confirm(`Approve $${amt} for this user?`)) {
                const userRef = db.collection("users").doc(uid);
                const doc = await userRef.get();
                let history = doc.data().history;

                history[index].status = "Successful";
                history[index].type = "Deposit Success";

                await userRef.update({
                    balance: firebase.firestore.FieldValue.increment(amt),
                    history: history
                });
                alert("Deposit Approved!");
            }
        }

        async function rejectDeposit(uid, index) {
            if (confirm("Reject this deposit?")) {
                const userRef = db.collection("users").doc(uid);
                const doc = await userRef.get();
                let history = doc.data().history;

                history[index].status = "Failed";
                history[index].type = "Deposit Rejected";

                await userRef.update({ history: history });
                alert("Deposit Rejected");
            }
        }

        async function editBalance(uid) {
            const val = prompt("New Balance Amount:");
            if (val !== null && !isNaN(val)) {
                await db.collection("users").doc(uid).update({ balance: parseFloat(val) });
            }
        }

        async function deleteAccount(uid) {
            if (confirm("PERMANENTLY DELETE THIS USER?")) {
                await db.collection("users").doc(uid).delete();
                alert("User Erased");
            }
        }
    </script>
</body>
</html>
