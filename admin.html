<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>willCoin | Master Admin HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { background:#050505; font-family:'Plus Jakarta Sans',sans-serif; color: white; min-height: 100vh; }
        .glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(12px); }
        .hidden { display: none !important; }
        .btn-cyan { background: #22d3ee; color: black; font-weight: 900; transition: all 0.2s; }
        .btn-cyan:hover { background: white; transform: translateY(-2px); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="loginGate" class="flex flex-col items-center justify-center min-h-[80vh]">
        <div class="glass p-10 rounded-[40px] text-center w-full max-w-sm border border-white/5">
            <div class="w-16 h-16 bg-cyan-400 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-[0_0_30px_rgba(34,211,238,0.3)]">
                <svg class="w-8 h-8 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h2 class="font-black uppercase text-[10px] tracking-[0.3em] mb-6 text-cyan-400">Master Terminal</h2>
            <input type="password" id="adminPin" placeholder="ENTER ACCESS PIN" class="w-full bg-white/5 rounded-2xl py-5 text-center text-xl font-black mb-4 outline-none border border-white/10 focus:border-cyan-400 transition-all tracking-widest text-white">
            <button onclick="checkPin()" class="w-full py-5 btn-cyan rounded-2xl font-black uppercase text-xs tracking-widest active:scale-95">Authorize Access</button>
        </div>
    </div>

    <div id="adminContent" class="hidden max-w-6xl mx-auto space-y-10">
        <div class="flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-center md:text-left">
                <p class="text-cyan-400 text-[10px] font-black uppercase tracking-[0.4em] mb-1">Root Access Active</p>
                <h1 class="text-4xl font-black uppercase tracking-tighter">willCoin <span class="text-white/20">HQ</span></h1>
            </div>
            <div class="flex gap-4">
                <button onclick="applyDailyProfit()" class="bg-white/5 border border-cyan-400/30 text-cyan-400 text-[10px] font-black uppercase px-6 py-3 rounded-full hover:bg-cyan-400 hover:text-black transition-all">⚡ Inject Daily Profit (7.1%)</button>
                <button onclick="handleLogout()" class="text-[10px] font-black uppercase text-white/40 bg-white/5 px-6 py-3 rounded-full border border-white/5 hover:bg-red-500 hover:text-white transition-all">Logout</button>
            </div>
        </div>

        <section>
            <div class="flex items-center gap-3 mb-6 px-2">
                <span class="w-2.5 h-2.5 rounded-full bg-cyan-400 animate-pulse"></span>
                <h2 class="text-xs font-black uppercase tracking-widest text-white/60">Verification Queue</h2>
            </div>
            <div class="glass rounded-[40px] overflow-hidden border border-white/5">
                <table class="w-full text-left">
                    <thead class="bg-white/5 uppercase text-[9px] font-black text-gray-500 border-b border-white/5">
                        <tr>
                            <th class="p-6">User</th>
                            <th class="p-6">Details</th>
                            <th class="p-6 text-center">Amount</th>
                            <th class="p-6 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="adminQueue" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </section>

        <section>
            <h2 class="text-xs font-black uppercase tracking-widest text-white/20 mb-6 px-2">Global User Directory</h2>
            <div class="glass rounded-[40px] overflow-hidden border border-white/5">
                <table class="w-full text-left">
                    <thead class="bg-white/5 uppercase text-[9px] font-black text-gray-500 border-b border-white/5">
                        <tr>
                            <th class="p-6">Account Info</th>
                            <th class="p-6">Available Balance</th>
                            <th class="p-6 text-right">Control</th>
                        </tr>
                    </thead>
                    <tbody id="userList" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDsY7hDvNEDq_8SE0XcHrgLU5e6kQxpMPA", 
            authDomain: "willcoincapital.firebaseapp.com", 
            projectId: "willcoincapital", 
            storageBucket: "willcoincapital.firebasestorage.app", 
            messagingSenderId: "241566024834", 
            appId: "1:241566024834:web:75e0d771ca7eb9a5a3a09b" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        const ADMIN_PIN = "555888"; 
        const MASTER_UID = "Gi9GoDeliBTlLwWqmjf24KlzYY42"; // Your Specific Admin ID

        // Auth & Session Logic
        auth.onAuthStateChanged(user => {
            if (user && user.uid === MASTER_UID && localStorage.getItem('admin_session') === 'active') {
                showAdminPanel();
            } else if (localStorage.getItem('admin_session') === 'active') {
                alert("Security Violation: Log in with the Master Admin account.");
                handleLogout();
            }
        });

        function checkPin() {
            if (document.getElementById('adminPin').value === ADMIN_PIN) {
                localStorage.setItem('admin_session', 'active');
                if (auth.currentUser && auth.currentUser.uid === MASTER_UID) {
                    showAdminPanel();
                } else {
                    alert("PIN Correct. Now log in to the Master Account via index page.");
                    window.location.href = "index.html";
                }
            } else { alert("INVALID PIN"); }
        }

        function showAdminPanel() {
            document.getElementById('loginGate').classList.add('hidden');
            document.getElementById('adminContent').classList.remove('hidden');
            syncData();
        }

        function handleLogout() { localStorage.removeItem('admin_session'); auth.signOut(); location.reload(); }

        function syncData() {
            db.collection('users').onSnapshot(snap => {
                const queueBox = document.getElementById('adminQueue');
                const userBox = document.getElementById('userList');
                queueBox.innerHTML = ""; userBox.innerHTML = "";
                let pendingCount = 0;

                snap.forEach(doc => {
                    const user = doc.data();
                    const uid = doc.id;
                    const history = user.history || [];

                    // Queue Management
                    history.forEach((tx, index) => {
                        if (tx.status === "Verifying" || tx.status === "Pending") {
                            pendingCount++;
                            queueBox.innerHTML += `
                                <tr class="hover:bg-white/[0.02] transition-colors">
                                    <td class="p-6">
                                        <div class="text-sm font-bold">${user.email}</div>
                                        <div class="text-[8px] text-white/20 font-mono mt-1 uppercase">${uid}</div>
                                    </td>
                                    <td class="p-6">
                                        <div class="text-[9px] font-black text-cyan-400 uppercase tracking-widest">${tx.type}</div>
                                        <div class="text-[8px] text-gray-500 mt-1">${tx.date || 'Pending Date'}</div>
                                    </td>
                                    <td class="p-6 font-black text-center text-xl text-white tracking-tighter">$${(tx.amount || 0).toLocaleString()}</td>
                                    <td class="p-6 text-right flex gap-2 justify-end mt-4">
                                        <button onclick="processTx('${uid}', ${index}, 'Successful')" class="bg-cyan-400 text-black px-4 py-2 rounded-xl text-[9px] font-black uppercase">Approve</button>
                                        <button onclick="processTx('${uid}', ${index}, 'Failed')" class="bg-white/5 text-red-500 border border-red-500/20 px-4 py-2 rounded-xl text-[9px] font-black uppercase">Reject</button>
                                    </td>
                                </tr>`;
                        }
                    });

                    // Directory Management
                    userBox.innerHTML += `
                        <tr class="hover:bg-white/[0.01]">
                            <td class="p-6">
                                <div class="text-sm font-bold">${user.email}</div>
                                <div class="text-[8px] text-white/20 font-mono mt-1 uppercase">ID: ${uid}</div>
                            </td>
                            <td class="p-6 font-black">
                                <div class="text-cyan-400 text-2xl tracking-tighter">$${(user.balance || 0).toLocaleString()}</div>
                            </td>
                            <td class="p-6 text-right space-x-2">
                                <button onclick="editBal('${uid}')" class="bg-white/5 border border-white/10 text-white/40 px-4 py-2 rounded-xl text-[8px] font-black uppercase hover:border-cyan-400 hover:text-cyan-400">Edit Bal</button>
                                <button onclick="deleteAcc('${uid}')" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-xl text-[8px] font-black uppercase hover:bg-red-500 transition-all">Delete</button>
                            </td>
                        </tr>`;
                });

                if (pendingCount === 0) queueBox.innerHTML = '<tr><td colspan="4" class="p-16 text-center text-white/10 uppercase font-black text-[10px] tracking-[0.3em]">System Clear • No Tasks</td></tr>';
            }, err => {
                alert("Master Access Error: Please check your Firebase Rules for UID mismatch.");
            });
        }

        async function processTx(uid, idx, status) {
            if(!confirm(`${status.toUpperCase()} this request?`)) return;
            try {
                const ref = db.collection("users").doc(uid);
                const doc = await ref.get();
                let history = doc.data().history;
                let tx = history[idx];
                
                const isDeposit = tx.type.toLowerCase().includes("deposit");
                const isWithdrawal = tx.type.toLowerCase().includes("withdrawal");

                history[idx].status = status;
                const update = { history: history };

                if (isDeposit && status === 'Successful') update.balance = firebase.firestore.FieldValue.increment(tx.amount);
                if (isWithdrawal && status === 'Failed') update.balance = firebase.firestore.FieldValue.increment(tx.amount);

                await ref.update(update);
                alert("Update Complete");
            } catch (e) { alert("Database Error"); }
        }

        async function applyDailyProfit() {
            const rate = 0.071; // 7.1%
            if(!confirm("Distribute profit to all accounts with active 7-day cycles?")) return;

            const snap = await db.collection("users").get();
            let count = 0;

            for (const doc of snap.docs) {
                const data = doc.data();
                const hasActive = (data.history || []).some(t => t.type === "7-Day Cycle Active");

                if (hasActive) {
                    const gain = data.balance * rate;
                    await db.collection("users").doc(doc.id).update({
                        balance: firebase.firestore.FieldValue.increment(gain),
                        history: firebase.firestore.FieldValue.arrayUnion({
                            id: "GAIN-" + Math.random().toString(36).substr(2,5).toUpperCase(),
                            type: "Daily Profit",
                            amount: gain.toFixed(2),
                            status: "Successful",
                            date: new Date().toLocaleTimeString()
                        })
                    });
                    count++;
                }
            }
            alert(`Distributed to ${count} users.`);
        }

        async function editBal(uid) {
            const val = prompt("Set Absolute Balance:");
            if (val) await db.collection("users").doc(uid).update({ balance: parseFloat(val) });
        }

        async function deleteAcc(uid) {
            if (confirm("PERMANENTLY DELETE THIS ACCOUNT?")) { await db.collection("users").doc(uid).delete(); }
        }
    </script>
</body>
</html>
