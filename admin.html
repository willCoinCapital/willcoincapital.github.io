<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>willCoin | MASTER CONSOLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    <style>
        body { background: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: white; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(20px); }
        .neo-btn { background: #22d3ee; color: #000; font-weight: 900; transition: 0.3s; }
        .hidden { display: none !important; }
        .tab-active { color: #22d3ee; border-bottom: 2px solid #22d3ee; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10">

    <div id="gate" class="flex items-center justify-center min-h-[80vh]">
        <div class="glass p-10 rounded-[40px] w-full max-w-sm text-center">
            <h1 class="text-[10px] font-black uppercase tracking-[0.5em] text-cyan-400 mb-8">System Entry</h1>
            <input type="password" id="masterPin" placeholder="••••••" class="w-full bg-white/5 border border-white/10 rounded-2xl py-6 text-center text-3xl font-black outline-none focus:border-cyan-400 text-white mb-6 tracking-[0.5em]">
            <button onclick="unlock()" class="w-full py-5 neo-btn rounded-2xl text-xs uppercase tracking-widest active:scale-95">Authorize</button>
        </div>
    </div>

    <div id="terminal" class="hidden max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-4xl font-black tracking-tighter uppercase">willCoin <span class="opacity-20">Console</span></h1>
            <button onclick="location.reload()" class="bg-red-500/20 text-red-500 border border-red-500/20 px-6 py-2 rounded-full text-[9px] font-black uppercase">Lock</button>
        </header>

        <div class="flex gap-8 mb-8 border-b border-white/10">
            <button id="tabUsersBtn" onclick="switchTab('users')" class="pb-4 text-[10px] font-black uppercase tracking-widest tab-active">User Database</button>
            <button id="tabDepositsBtn" onclick="switchTab('deposits')" class="pb-4 text-[10px] font-black uppercase tracking-widest text-white/40">Pending Deposits</button>
        </div>

        <div id="sectionUsers" class="glass rounded-[30px] overflow-hidden border border-white/5">
            <table class="w-full text-left">
                <thead class="bg-white/5 text-[9px] font-black uppercase text-white/30 tracking-widest">
                    <tr><th class="p-8">Account</th><th class="p-8">Balance</th><th class="p-8 text-right">Actions</th></tr>
                </thead>
                <tbody id="userList" class="divide-y divide-white/5"></tbody>
            </table>
        </div>

        <div id="sectionDeposits" class="hidden glass rounded-[30px] overflow-hidden border border-white/5">
            <table class="w-full text-left">
                <thead class="bg-white/5 text-[9px] font-black uppercase text-white/30 tracking-widest">
                    <tr><th class="p-8">User</th><th class="p-8">Amount</th><th class="p-8 text-right">Decisions</th></tr>
                </thead>
                <tbody id="depositList" class="divide-y divide-white/5"></tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDsY7hDvNEDq_8SE0XcHrgLU5e6kQxpMPA", 
            authDomain: "willcoincapital.firebaseapp.com", 
            projectId: "willcoincapital", 
            storageBucket: "willcoincapital.firebasestorage.app", 
            messagingSenderId: "241566024834", 
            appId: "1:241566024834:web:75e0d771ca7eb9a5a3a09b" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function unlock() {
            if(document.getElementById('masterPin').value === "555888") {
                document.getElementById('gate').classList.add('hidden');
                document.getElementById('terminal').classList.remove('hidden');
                loadData();
            } else { alert("INVALID PIN"); }
        }

        function switchTab(tab) {
            document.getElementById('sectionUsers').classList.toggle('hidden', tab !== 'users');
            document.getElementById('sectionDeposits').classList.toggle('hidden', tab !== 'deposits');
            document.getElementById('tabUsersBtn').className = tab === 'users' ? 'pb-4 text-[10px] font-black uppercase tracking-widest tab-active' : 'pb-4 text-[10px] font-black uppercase tracking-widest text-white/40';
            document.getElementById('tabDepositsBtn').className = tab === 'deposits' ? 'pb-4 text-[10px] font-black uppercase tracking-widest tab-active' : 'pb-4 text-[10px] font-black uppercase tracking-widest text-white/40';
        }

        function loadData() {
            // LOAD USERS
            db.collection('users').onSnapshot(snap => {
                const list = document.getElementById('userList');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const u = doc.data();
                    list.innerHTML += `<tr>
                        <td class="p-8 text-sm font-bold">${u.email}</td>
                        <td class="p-8 font-black text-cyan-400 text-2xl">$${(u.balance || 0).toLocaleString()}</td>
                        <td class="p-8 text-right">
                            <button onclick="editBal('${doc.id}')" class="bg-white/5 border border-white/10 px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest">Edit</button>
                        </td>
                    </tr>`;
                });
            });

            // LOAD DEPOSITS (Collection name must be 'deposits')
            db.collection('deposits').onSnapshot(snap => {
                const list = document.getElementById('depositList');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    if(d.status === 'pending') {
                        list.innerHTML += `<tr>
                            <td class="p-8 text-sm font-bold text-white/80">${d.userEmail || d.email}</td>
                            <td class="p-8 font-black text-white text-2xl">$${d.amount.toLocaleString()}</td>
                            <td class="p-8 text-right space-x-3">
                                <button onclick="processDep('${doc.id}', '${d.userId}', ${d.amount}, 'approved')" class="bg-cyan-400 text-black px-6 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest">Approve</button>
                                <button onclick="processDep('${doc.id}', null, null, 'failed')" class="bg-red-500/10 text-red-500 border border-red-500/20 px-6 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest">Decline</button>
                            </td>
                        </tr>`;
                    }
                });
            }, err => { alert("Database Error: Check your Firebase Rules!"); });
        }

        async function editBal(id) {
            const val = prompt("New Balance:");
            if(val) await db.collection('users').doc(id).update({ balance: parseFloat(val) });
        }

        async function processDep(depId, userId, amount, status) {
            if (status === 'approved') {
                const userRef = db.collection('users').doc(userId);
                try {
                    await db.runTransaction(async (transaction) => {
                        const sfDoc = await transaction.get(userRef);
                        const newBalance = (sfDoc.data().balance || 0) + amount;
                        transaction.update(userRef, { balance: newBalance });
                        transaction.update(db.collection('deposits').doc(depId), { status: 'approved' });
                    });
                    alert("Deposit Approved!");
                } catch(e) { alert("Error: Make sure the User exists in your 'users' collection."); }
            } else {
                await db.collection('deposits').doc(depId).update({ status: 'failed' });
                alert("Deposit Declined.");
            }
        }
    </script>
</body>
</html>
