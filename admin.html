<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>willCoin Admin | Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { background:#050505; font-family:'Plus Jakarta Sans',sans-serif; color: white; }
        .glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(12px); }
        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div id="loginGate" class="glass p-10 rounded-[40px] text-center w-full max-w-sm">
        <div class="w-12 h-12 bg-cyan-400 rounded-2xl mx-auto mb-6 flex items-center justify-center">
            <svg class="w-6 h-6 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>
        <h2 class="font-black uppercase text-[10px] tracking-widest mb-6 text-white/40">Terminal Access</h2>
        <input type="password" id="adminPin" placeholder="••••••" class="w-full bg-white/5 rounded-2xl py-4 text-center text-2xl font-bold mb-4 outline-none border border-white/10 focus:border-cyan-400 transition-all text-cyan-400">
        <button onclick="checkPin()" class="w-full py-4 bg-cyan-400 text-black rounded-2xl font-black uppercase text-[11px] hover:bg-white transition-all active:scale-95">Verify Identity</button>
    </div>

    <div id="adminContent" class="hidden w-full max-w-5xl space-y-10 py-10">
        
        <div class="flex justify-between items-end px-2">
            <div>
                <p class="text-cyan-400 text-[10px] font-black uppercase tracking-widest mb-1">System Administrator</p>
                <h1 class="text-3xl font-black uppercase">Command <span class="text-white/20 text-xl ml-2">Center</span></h1>
            </div>
            <button onclick="location.reload()" class="text-[10px] font-black uppercase text-white/40 hover:text-white">Logout</button>
        </div>

        <section>
            <h2 class="text-sm font-black uppercase mb-4 px-2 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></span>
                Verification Queue
            </h2>
            <div class="glass rounded-[32px] overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-white/5 uppercase text-[9px] font-black text-gray-500">
                        <tr>
                            <th class="p-5">Transaction Info</th>
                            <th class="p-5 text-center">Amount</th>
                            <th class="p-5 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="adminQueue">
                        </tbody>
                </table>
            </div>
        </section>

        <section>
            <h2 class="text-sm font-black uppercase mb-4 px-2">User Management</h2>
            <div class="glass rounded-[32px] overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-white/5 uppercase text-[9px] font-black text-gray-500">
                        <tr>
                            <th class="p-5">User Account</th>
                            <th class="p-5">Available Balance</th>
                            <th class="p-5 text-right">Settings</th>
                        </tr>
                    </thead>
                    <tbody id="userList">
                        </tbody>
                </table>
            </div>
        </section>

    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDsY7hDvNEDq_8SE0XcHrgLU5e6kQxpMPA",
            authDomain: "willcoincapital.firebaseapp.com",
            projectId: "willcoincapital",
            storageBucket: "willcoincapital.firebasestorage.app",
            messagingSenderId: "241566024834",
            appId: "1:241566024834:web:75e0d771ca7eb9a5a3a09b"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const ADMIN_PIN = "555888"; 

        function checkPin() {
            const val = document.getElementById('adminPin').value;
            if (val === ADMIN_PIN) {
                document.getElementById('loginGate').classList.add('hidden');
                document.getElementById('adminContent').classList.remove('hidden');
                loadQueue();
                loadUsers();
            } else {
                alert("ACCESS DENIED: INVALID PIN");
            }
        }

        // --- 1. LOAD ALL TRANSACTIONS ---
        async function loadQueue() {
            const snap = await db.collectionGroup('transactions').get();
            const box = document.getElementById('adminQueue');
            box.innerHTML = "";
            
            if (snap.empty) {
                box.innerHTML = '<tr><td colspan="3" class="p-10 text-center text-white/20 uppercase text-[10px] tracking-widest">No transaction records found</td></tr>';
                return;
            }

            snap.forEach(doc => {
                const tx = doc.data();
                const uid = doc.ref.parent.parent.id;
                const isPending = tx.status === 'pending';
                
                box.innerHTML += `
                    <tr class="border-b border-white/5 hover:bg-white/[0.01]">
                        <td class="p-5">
                            <div class="text-[10px] font-mono text-gray-500 mb-1">${doc.id}</div>
                            <div class="inline-block px-2 py-0.5 rounded text-[8px] font-black uppercase ${tx.status === 'completed' ? 'bg-green-500/10 text-green-500' : tx.status === 'failed' ? 'bg-red-500/10 text-red-500' : 'bg-cyan-400/10 text-cyan-400'}">
                                ${tx.status || 'Unknown'}
                            </div>
                        </td>
                        <td class="p-5 font-black text-center text-lg">$${(tx.amount || 0).toLocaleString()}</td>
                        <td class="p-5 text-right">
                            ${isPending ? `
                                <div class="flex flex-col sm:flex-row gap-2 justify-end">
                                    <button onclick="updateStatus('${uid}', '${doc.id}', ${tx.amount}, 'completed')" class="bg-cyan-400 text-black px-4 py-2 rounded-xl text-[9px] font-black uppercase hover:bg-white transition">Success</button>
                                    <button onclick="updateStatus('${uid}', '${doc.id}', ${tx.amount}, 'failed')" class="border border-red-500/50 text-red-500 px-4 py-2 rounded-xl text-[9px] font-black uppercase hover:bg-red-500 hover:text-white transition">Fail</button>
                                </div>
                            ` : `<span class="text-[9px] text-white/20 uppercase font-black tracking-widest">Archived</span>`}
                        </td>
                    </tr>`;
            });
        }

        // --- 2. LOAD ALL USERS ---
        async function loadUsers() {
            const snap = await db.collection('users').get();
            const box = document.getElementById('userList');
            box.innerHTML = "";
            
            snap.forEach(doc => {
                const user = doc.data();
                box.innerHTML += `
                    <tr class="border-b border-white/5">
                        <td class="p-5">
                            <div class="text-sm font-bold text-white">${user.email || 'Anonymous'}</div>
                            <div class="text-[9px] text-white/20 font-mono">${doc.id}</div>
                        </td>
                        <td class="p-5 font-black text-cyan-400">$${(user.balance || 0).toLocaleString()}</td>
                        <td class="p-5 text-right">
                            <button onclick="editUser('${doc.id}', 'balance')" class="border border-white/10 text-white/40 px-4 py-2 rounded-xl text-[9px] font-black uppercase hover:text-cyan-400 hover:border-cyan-400/30 transition">Edit Balance</button>
                        </td>
                    </tr>`;
            });
        }

        // --- 3. ACTIONS ---
        async function updateStatus(uid, tid, amt, newStatus) {
            const msg = newStatus === 'completed' ? `Approve $${amt} for this user?` : `Mark transaction as FAILED?`;
            if (confirm(msg)) {
                try {
                    await db.collection("users").doc(uid).collection("transactions").doc(tid).update({
                        status: newStatus,
                        type: newStatus === 'completed' ? "Deposit Success" : "Deposit Failed"
                    });

                    if (newStatus === 'completed') {
                        await db.collection("users").doc(uid).update({
                            balance: firebase.firestore.FieldValue.increment(amt)
                        });
                    }

                    alert("Database Updated");
                    loadQueue();
                    loadUsers();
                } catch (e) { alert("Error: " + e.message); }
            }
        }

        async function editUser(uid, field) {
            const newVal = prompt(`Enter new absolute total for ${field}:`);
            if (newVal !== null && !isNaN(newVal)) {
                const updateData = {};
                updateData[field] = parseFloat(newVal);
                await db.collection("users").doc(uid).update(updateData);
                alert("Profile Updated");
                loadUsers();
            }
        }
    </script>
</body>
</html>
