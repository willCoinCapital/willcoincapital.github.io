<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>willCoin | TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    <style>
        body { background: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: white; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(20px); }
        .pin-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); letter-spacing: 0.5em; }
        .btn-glow { background: #22d3ee; color: #000; font-weight: 900; box-shadow: 0 0 20px rgba(34,211,238,0.2); }
        .hidden { display: none !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .live-dot { width: 8px; height: 8px; background: #22d3ee; border-radius: 50%; animation: pulse 2s infinite; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div id="gate" class="w-full max-w-sm text-center">
        <div class="glass p-10 rounded-[40px] border border-white/10">
            <div class="w-16 h-16 bg-white/5 border border-white/10 rounded-2xl mx-auto mb-6 flex items-center justify-center">
                <svg class="w-8 h-8 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h1 class="text-[10px] font-black uppercase tracking-[0.5em] text-white/40 mb-8">System Lock</h1>
            
            <input type="password" id="masterPin" placeholder="••••••" maxlength="6" class="w-full pin-input rounded-2xl py-6 text-center text-3xl font-black outline-none focus:border-cyan-400 text-white mb-6">
            
            <button onclick="unlock()" class="w-full py-5 btn-glow rounded-2xl text-xs uppercase tracking-widest active:scale-95 transition-transform">Authorize Access</button>
        </div>
    </div>

    <div id="terminal" class="hidden w-full max-w-5xl">
        <header class="flex justify-between items-center mb-10">
            <div>
                <div class="flex items-center gap-2 mb-2">
                    <div class="live-dot"></div>
                    <span class="text-[10px] font-black uppercase tracking-widest text-cyan-400">Master Root Active</span>
                </div>
                <h1 class="text-4xl font-black tracking-tighter uppercase">willCoin <span class="opacity-20">Console</span></h1>
            </div>
            <button onclick="lock()" class="bg-white/5 border border-white/10 px-6 py-3 rounded-full text-[9px] font-black uppercase hover:bg-red-500 transition-colors">Lock Terminal</button>
        </header>

        <div class="glass rounded-[30px] overflow-hidden border border-white/5">
            <table class="w-full text-left">
                <thead class="bg-white/5 text-[9px] font-black uppercase text-white/30 tracking-widest">
                    <tr><th class="p-8">User Database</th><th class="p-8">Balance Status</th><th class="p-8 text-right">Commands</th></tr>
                </thead>
                <tbody id="dataBody" class="divide-y divide-white/5">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDsY7hDvNEDq_8SE0XcHrgLU5e6kQxpMPA", 
            authDomain: "willcoincapital.firebaseapp.com", 
            projectId: "willcoincapital", 
            storageBucket: "willcoincapital.firebasestorage.app", 
            messagingSenderId: "241566024834", 
            appId: "1:241566024834:web:75e0d771ca7eb9a5a3a09b" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const MASTER_KEY = "555888";

        function unlock() {
            const input = document.getElementById('masterPin').value;
            if(input === MASTER_KEY) {
                sessionStorage.setItem('is_admin', 'true');
                renderTerminal();
            } else {
                alert("ACCESS DENIED: INVALID PIN");
                document.getElementById('masterPin').value = "";
            }
        }

        function renderTerminal() {
            if(sessionStorage.getItem('is_admin') === 'true') {
                document.getElementById('gate').classList.add('hidden');
                document.getElementById('terminal').classList.remove('hidden');
                loadData();
            }
        }

        function loadData() {
            db.collection('users').onSnapshot(snap => {
                const body = document.getElementById('dataBody');
                body.innerHTML = "";
                snap.forEach(doc => {
                    const u = doc.data();
                    body.innerHTML += `
                        <tr class="hover:bg-white/[0.01]">
                            <td class="p-8 font-bold text-sm text-white/80">${u.email}</td>
                            <td class="p-8 font-black text-2xl text-cyan-400 tracking-tighter">$${(u.balance || 0).toLocaleString()}</td>
                            <td class="p-8 text-right space-x-2">
                                <button onclick="updateBal('${doc.id}')" class="bg-white/5 border border-white/10 px-4 py-2 rounded-xl text-[9px] font-black uppercase hover:border-cyan-400 transition-all">Edit</button>
                                <button onclick="purge('${doc.id}')" class="text-red-500 text-[9px] font-black uppercase ml-4">Delete</button>
                            </td>
                        </tr>`;
                });
            }, err => {
                console.error(err);
                alert("Database Locked. Make sure your Firebase Rules allow Public access for testing!");
            });
        }

        async function updateBal(id) {
            const val = prompt("New Balance:");
            if(val !== null) await db.collection('users').doc(id).update({ balance: parseFloat(val) });
        }

        async function purge(id) {
            if(confirm("Purge user from system?")) await db.collection('users').doc(id).delete();
        }

        function lock() {
            sessionStorage.clear();
            location.reload();
        }

        // Auto-unlock if session exists
        if(sessionStorage.getItem('is_admin') === 'true') renderTerminal();
    </script>
</body>
</html>
