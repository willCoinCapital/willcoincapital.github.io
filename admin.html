<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>willCoin Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { background:#050505; font-family:'Plus Jakarta Sans',sans-serif; color: white; }
        .glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

    <div id="loginGate" class="glass p-10 rounded-[40px] text-center w-80">
        <h2 class="font-black uppercase text-[10px] tracking-widest mb-6 text-white/40">Secure Access</h2>
        <input type="password" id="adminPin" placeholder="ENTER PIN" class="w-full bg-white/5 rounded-2xl py-4 text-center text-xl font-bold mb-4 outline-none border border-white/10 focus:border-cyan-400 transition-all">
        <button onclick="checkPin()" class="w-full py-4 bg-cyan-400 text-black rounded-2xl font-black uppercase text-[11px] hover:bg-white transition">Unlock Dashboard</button>
    </div>

    <div id="adminContent" class="hidden w-full max-w-5xl p-6 space-y-10">
        
        <section>
            <h1 class="text-2xl font-black uppercase mb-6">Verification <span class="text-cyan-400">Queue</span></h1>
            <div class="glass rounded-[32px] overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-white/5 uppercase text-[10px] font-black text-gray-500">
                        <tr><th class="p-5">Transaction ID</th><th class="p-5">Amount</th><th class="p-5 text-right">Action</th></tr>
                    </thead>
                    <tbody id="adminQueue"></tbody>
                </table>
            </div>
        </section>

        <section>
            <h1 class="text-2xl font-black uppercase mb-6">User <span class="text-cyan-400">Management</span></h1>
            <div class="glass rounded-[32px] overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-white/5 uppercase text-[10px] font-black text-gray-500">
                        <tr><th class="p-5">Account Email</th><th class="p-5">Balance</th><th class="p-5 text-right">Actions</th></tr>
                    </thead>
                    <tbody id="userList"></tbody>
                </table>
            </div>
        </section>

    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDsY7hDvNEDq_8SE0XcHrgLU5e6kQxpMPA",
            authDomain: "willcoincapital.firebaseapp.com",
            projectId: "willcoincapital",
            storageBucket: "willcoincapital.firebasestorage.app",
            messagingSenderId: "241566024834",
            appId: "1:241566024834:web:75e0d771ca7eb9a5a3a09b"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const ADMIN_PIN = "555888"; 

        function checkPin() {
            const val = document.getElementById('adminPin').value;
            if (val === ADMIN_PIN) {
                document.getElementById('loginGate').classList.add('hidden');
                document.getElementById('adminContent').classList.remove('hidden');
                loadQueue();
                loadUsers();
            } else {
                alert("Invalid PIN");
            }
        }

        async function loadQueue() {
            const snap = await db.collectionGroup('transactions').where('status', '==', 'pending').get();
            const box = document.getElementById('adminQueue');
            box.innerHTML = snap.empty ? '<p class="p-10 text-white/20 uppercase text-[10px]">No pending deposits</p>' : "";
            
            snap.forEach(doc => {
                const tx = doc.data();
                const uid = doc.ref.parent.parent.id;
                box.innerHTML += `
                    <tr class="border-b border-white/5">
                        <td class="p-5 text-[10px] font-mono text-gray-500">${doc.id}</td>
                        <td class="p-5 font-black text-cyan-400">$${(tx.amount || 0).toLocaleString()}</td>
                        <td class="p-5 text-right">
                            <button onclick="approve('${uid}', '${doc.id}', ${tx.amount})" class="bg-cyan-400 text-black px-5 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-white transition">Approve</button>
                        </td>
                    </tr>`;
            });
        }

        async function loadUsers() {
            const snap = await db.collection('users').get();
            const box = document.getElementById('userList');
            box.innerHTML = "";
            
            snap.forEach(doc => {
                const user = doc.data();
                box.innerHTML += `
                    <tr class="border-b border-white/5">
                        <td class="p-5 text-sm font-bold text-white">${user.email || 'No Email'}</td>
                        <td class="p-5 font-black text-white">$${(user.balance || 0).toLocaleString()}</td>
                        <td class="p-5 text-right space-x-2">
                            <button onclick="editUser('${doc.id}', 'balance')" class="border border-white/10 text-white/40 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase hover:text-cyan-400 hover:border-cyan-400/30">Edit Balance</button>
                        </td>
                    </tr>`;
            });
        }

        async function approve(uid, tid, amt) {
            if (confirm(`Approve deposit of $${amt}?`)) {
                await db.collection("users").doc(uid).collection("transactions").doc(tid).update({
                    status: "completed",
                    type: "Deposit Success"
                });
                await db.collection("users").doc(uid).update({
                    balance: firebase.firestore.FieldValue.increment(amt)
                });
                alert("Transaction Completed!");
                loadQueue();
                loadUsers();
            }
        }

        async function editUser(uid, field) {
            const newVal = prompt(`Enter new total for ${field}:`);
            if (newVal !== null) {
                const updateData = {};
                updateData[field] = parseFloat(newVal);
                await db.collection("users").doc(uid).update(updateData);
                alert("User Updated!");
                loadUsers();
            }
        }
    </script>
</body>
</html>
