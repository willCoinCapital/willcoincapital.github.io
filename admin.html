<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WILLCOIN | HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #0b0b0b; font-family: 'Plus Jakarta Sans', sans-serif; color: white; }
        .glass-card { background: #161616; border: 1px solid #222; border-radius: 24px; overflow: hidden; }
        .accent-text { color: #22d3ee; }
        .pending-badge { background: rgba(34, 211, 238, 0.1); color: #22d3ee; border: 1px solid rgba(34, 211, 238, 0.2); }
        
        /* SweetAlert Dark Theme Customization */
        .swal2-popup {
            background: #161616 !important;
            color: white !important;
            border-radius: 24px !important;
            border: 1px solid #222 !important;
        }
        .swal2-title { color: white !important; font-weight: 800 !important; }
        .swal2-confirm { background-color: #22d3ee !important; color: black !important; font-weight: 700 !important; border-radius: 12px !important; }
        .swal2-cancel { background-color: #1a1a1a !important; color: #666 !important; border-radius: 12px !important; }
    </style>
</head>
<body class="min-h-screen p-6 max-w-4xl mx-auto">

    <div id="gate" class="flex flex-col items-center justify-center min-h-[80vh]">
        <h2 class="text-xs font-bold uppercase tracking-[0.3em] mb-8">Master Terminal</h2>
        <input type="password" id="masterPin" placeholder="••••••" class="bg-[#161616] border border-white/10 rounded-xl py-4 px-6 text-center text-2xl tracking-[0.5em] focus:outline-none focus:border-cyan-400 mb-4 w-64">
        <button onclick="unlock()" class="bg-white text-black font-extrabold py-4 px-12 rounded-xl text-xs uppercase tracking-widest">Authorize Access</button>
    </div>

    <div id="terminal" class="hidden">
        <header class="flex justify-between items-center mb-12">
            <h1 class="text-3xl font-black tracking-tighter">WILLCOIN <span class="opacity-30">HQ</span></h1>
            <button onclick="location.reload()" class="bg-[#1a1a1a] text-white/40 px-5 py-2 rounded-full text-[9px] font-bold uppercase tracking-widest">Logout</button>
        </header>

        <section class="mb-12">
            <h3 class="text-[10px] font-black uppercase tracking-widest mb-6">Verification Queue</h3>
            <div class="glass-card" id="verificationList"></div>
        </section>

        <section>
            <h3 class="text-[10px] font-black uppercase tracking-widest mb-6">Global User Directory</h3>
            <div class="glass-card" id="userDirectory"></div>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDsY7hDvNEDq_8SE0XcHrgLU5e6kQxpMPA", 
            authDomain: "willcoincapital.firebaseapp.com", 
            projectId: "willcoincapital", 
            storageBucket: "willcoincapital.firebasestorage.app", 
            messagingSenderId: "241566024834", 
            appId: "1:241566024834:web:75e0d771ca7eb9a5a3a09b" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function unlock() {
            if(document.getElementById('masterPin').value === "555888") {
                document.getElementById('gate').classList.add('hidden');
                document.getElementById('terminal').classList.remove('hidden');
                loadHQ();
            } else { 
                Swal.fire({ icon: 'error', title: 'Access Denied', text: 'Invalid Master PIN', toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 });
            }
        }

        function loadHQ() {
            db.collection('users').onSnapshot(snap => {
                const vList = document.getElementById('verificationList');
                const dList = document.getElementById('userDirectory');
                vList.innerHTML = ""; dList.innerHTML = "";

                snap.forEach(doc => {
                    const u = doc.data();
                    const uid = doc.id;

                    // User Directory Row
                    dList.innerHTML += `
                    <div class="grid grid-cols-3 p-6 items-center border-b border-white/5">
                        <p class="font-bold text-sm truncate">${u.email}</p>
                        <p class="text-cyan-400 font-black text-xl text-center">$${(u.balance || 0).toLocaleString()}</p>
                        <div class="flex justify-end gap-2">
                            <button onclick="editBal('${uid}')" class="bg-white/5 text-[8px] font-black px-3 py-2 rounded-md uppercase">Edit</button>
                        </div>
                    </div>`;

                    // Verification Scanner
                    if (u.history && Array.isArray(u.history)) {
                        u.history.forEach((item, index) => {
                            const status = (item.status || "").toUpperCase();
                            if (status.includes("PENDING") || status.includes("VERIFYING")) {
                                vList.innerHTML += `
                                <div class="grid grid-cols-3 p-6 items-center border-b border-white/5">
                                    <p class="font-bold text-sm">${u.email}</p>
                                    <div class="text-center">
                                        <button onclick="approveDeposit('${uid}', ${index}, '${u.email}', ${item.amount})" class="pending-badge px-3 py-1 rounded text-[8px] font-black uppercase">
                                            ${item.status}
                                        </button>
                                    </div>
                                    <p class="text-white font-black text-2xl text-right">$${(item.amount || 0).toLocaleString()}</p>
                                </div>`;
                            }
                        });
                    }
                });
            });
        }

        async function approveDeposit(uid, index, email, amount) {
            const result = await Swal.fire({
                title: 'Confirm Approval',
                text: `Approve $${amount.toLocaleString()} for ${email}?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Yes, Approve Funds',
                cancelButtonText: 'Cancel'
            });

            if (result.isConfirmed) {
                const ref = db.collection('users').doc(uid);
                try {
                    await db.runTransaction(async (t) => {
                        const snap = await t.get(ref);
                        let data = snap.data();
                        let history = [...data.history];
                        history[index].status = "Successful";
                        t.update(ref, { 
                            history: history, 
                            balance: (parseFloat(data.balance) || 0) + parseFloat(amount) 
                        });
                    });
                    Swal.fire({ icon: 'success', title: 'Funds Approved', showConfirmButton: false, timer: 1500 });
                } catch(e) { 
                    Swal.fire({ icon: 'error', title: 'Transaction Failed', text: e.message });
                }
            }
        }

        async function editBal(id) {
            const { value: newBal } = await Swal.fire({
                title: 'Adjust Balance',
                input: 'number',
                inputLabel: 'Enter the new balance amount',
                inputPlaceholder: 'e.g. 5000',
                showCancelButton: true
            });
            if (newBal) {
                await db.collection('users').doc(id).update({ balance: parseFloat(newBal) });
                Swal.fire('Updated!', 'Balance has been changed.', 'success');
            }
        }
    </script>
</body>
</html>
