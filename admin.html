<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WILLCOIN | HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #0b0b0b; font-family: 'Plus Jakarta Sans', sans-serif; color: white; }
        .glass-card { background: #161616; border: 1px solid #222; border-radius: 24px; overflow: hidden; }
        .accent-text { color: #22d3ee; }
        .pending-badge { background: rgba(34, 211, 238, 0.1); color: #22d3ee; border: 1px solid rgba(34, 211, 238, 0.2); transition: all 0.3s; }
        .pending-badge:hover { background: #22d3ee; color: #000; }
        .hidden { display: none !important; }

        /* SweetAlert Professional Dark Theme */
        .swal2-popup { background: #161616 !cite: 14, 15]; color: white !cite: 14, 15]; border-radius: 24px !cite: 14, 15]; border: 1px solid #222 !cite: 14, 15]; }
        .swal2-title { color: white !cite: 14, 15]; font-weight: 800 !cite: 14, 15]; }
        .swal2-confirm { background-color: #22d3ee !cite: 14, 15]; color: black !cite: 14, 15]; font-weight: 700 !cite: 14, 15]; border-radius: 12px !cite: 14, 15]; }
        .swal2-cancel { background-color: #ef4444 !cite: 15]; color: white !cite: 15]; font-weight: 700 !cite: 15]; border-radius: 12px !cite: 15]; }
    </style>
</head>
<body class="min-h-screen p-6 max-w-4xl mx-auto">

    <div id="gate" class="flex flex-col items-center justify-center min-h-[80vh]">
        <h2 class="text-[10px] font-black uppercase tracking-[0.4em] mb-8 text-white/40">Master Root Active</h2>
        <input type="password" id="masterPin" placeholder="••••••" class="bg-[#161616] border border-white/10 rounded-2xl py-5 px-6 text-center text-3xl tracking-[0.5em] focus:outline-none focus:border-cyan-400 mb-6 w-72">
        <button onclick="unlock()" class="bg-white text-black font-black py-4 px-12 rounded-xl text-[10px] uppercase tracking-widest hover:scale-105 transition">Authorize Access</button>
    </div>

    <div id="terminal" class="hidden">
        <header class="flex justify-between items-center mb-12">
            <div>
                <p class="text-[9px] font-bold uppercase tracking-widest accent-text mb-1">• Master Terminal</p>
                <h1 class="text-3xl font-black tracking-tighter">WILLCOIN <span class="opacity-30">HQ</span></h1>
            </div>
            <button onclick="location.reload()" class="bg-[#1a1a1a] text-white/40 px-5 py-2 rounded-full text-[9px] font-bold uppercase tracking-widest border border-white/5">Secure Logout</button>
        </header>

        <section class="mb-12">
            <h3 class="text-[10px] font-black uppercase tracking-widest mb-6 flex items-center">
                <span class="w-2 h-2 bg-cyan-400 rounded-full mr-3 animate-pulse"></span> Verification Queue
            </h3>
            <div class="glass-card">
                <div id="verificationList" class="divide-y divide-white/5">
                    </div>
            </div>
        </section>

        <section>
            <h3 class="text-[10px] font-black uppercase tracking-widest mb-6">Global User Directory</h3>
            <div class="glass-card">
                <div id="userDirectory" class="divide-y divide-white/5"></div>
            </div>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDsY7hDvNEDq_8SE0XcHrgLU5e6kQxpMPA", 
            authDomain: "willcoincapital.firebaseapp.com", 
            projectId: "willcoincapital", 
            storageBucket: "willcoincapital.firebasestorage.app", 
            messagingSenderId: "241566024834", 
            appId: "1:241566024834:web:75e0d771ca7eb9a5a3a09b" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function unlock() {
            if(document.getElementById('masterPin').value === "555888") {
                document.getElementById('gate').classList.add('hidden');
                document.getElementById('terminal').classList.remove('hidden');
                loadHQ();
            } else { 
                Swal.fire({ icon: 'error', title: 'Access Denied', background: '#161616', color: '#fff', toast: true, position: 'top', showConfirmButton: false, timer: 2000 });
            }
        }

        function loadHQ() {
            db.collection('users').onSnapshot(snap => {
                const vList = document.getElementById('verificationList');
                const dList = document.getElementById('userDirectory');
                vList.innerHTML = ""; dList.innerHTML = "";

                snap.forEach(doc => {
                    const u = doc.data();
                    const uid = doc.id;

                    // 1. Directory Listing
                    dList.innerHTML += `
                    <div class="grid grid-cols-3 p-6 items-center hover:bg-white/[0.02] transition">
                        <div>
                            <p class="font-bold text-sm truncate">${u.email}</p>
                            <p class="text-[8px] text-white/20 mt-1">${uid}</p>
                        </div>
                        <div class="text-center">
                            <p class="text-cyan-400 font-black text-xl">$${(u.balance || 0).toLocaleString()}</p>
                        </div>
                        <div class="flex justify-end gap-2">
                            <button onclick="editBal('${uid}')" class="bg-white/5 text-[8px] font-black px-4 py-2 rounded-lg uppercase border border-white/5">Edit</button>
                            <button onclick="deleteUser('${uid}')" class="bg-red-500/10 text-red-500 text-[8px] font-black px-4 py-2 rounded-lg uppercase border border-red-500/10">Delete</button>
                        </div>
                    </div>`;

                    // 2. Verification Scanner (Filters for "VERIFYING" or "PENDING")
                    if (u.history && Array.isArray(u.history)) {
                        u.history.forEach((item, index) => {
                            const status = (item.status || "").toUpperCase();
                            if (status.includes("PENDING") || status.includes("VERIFYING")) {
                                vList.innerHTML += `
                                <div class="grid grid-cols-3 p-6 items-center hover:bg-white/[0.02]">
                                    <div>
                                        <p class="font-bold text-sm">${u.email}</p>
                                        <p class="text-[8px] text-white/20 mt-1">${item.id || 'WC-TX'}</p>
                                    </div>
                                    <div class="text-center">
                                        <button onclick="processDeposit('${uid}', ${index}, '${u.email}', ${item.amount})" class="pending-badge px-4 py-1.5 rounded-full text-[9px] font-black uppercase">
                                            ${item.status}
                                        </button>
                                    </div>
                                    <p class="text-white font-black text-2xl text-right">$${(item.amount || 0).toLocaleString()}</p>
                                </div>`;
                            }
                        });
                    }
                });
                if(vList.innerHTML === "") vList.innerHTML = `<p class="p-16 text-center text-white/10 text-[10px] uppercase font-black tracking-[0.5em]">Queue Clear</p>`;
            });
        }

        // - Professional Process Logic with Decline
        async function processDeposit(uid, index, email, amount) {
            const result = await Swal.fire({
                title: 'Transaction Action',
                text: `Reviewing $${amount.toLocaleString()} for ${email}`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Approve Funds',
                cancelButtonText: 'Decline',
                confirmButtonColor: '#22d3ee',
                cancelButtonColor: '#ef4444',
                reverseButtons: true
            });

            const ref = db.collection('users').doc(uid);

            if (result.isConfirmed) {
                // APPROVE
                try {
                    await db.runTransaction(async (t) => {
                        const snap = await t.get(ref);
                        let data = snap.data();
                        let history = [...data.history];
                        history[index].status = "Successful";
                        t.update(ref, { 
                            history: history, 
                            balance: (parseFloat(data.balance) || 0) + parseFloat(amount) 
                        });
                    });
                    Swal.fire({ icon: 'success', title: 'Approved', background: '#161616', color: '#fff', showConfirmButton: false, timer: 1500 });
                } catch(e) { Swal.fire({ icon: 'error', title: 'Error', text: e.message, background: '#161616' }); }
            } 
            else if (result.dismiss === Swal.DismissReason.cancel) {
                // DECLINE
                try {
                    await db.runTransaction(async (t) => {
                        const snap = await t.get(ref);
                        let history = [...snap.data().history];
                        history[index].status = "Failed";
                        t.update(ref, { history: history });
                    });
                    Swal.fire({ icon: 'info', title: 'Declined', text: 'Marked as Failed', background: '#161616', color: '#fff', showConfirmButton: false, timer: 1500 });
                } catch(e) { Swal.fire({ icon: 'error', title: 'Error', text: e.message, background: '#161616' }); }
            }
        }

        async function editBal(id) {
            const { value: newBal } = await Swal.fire({
                title: 'Adjust Balance',
                input: 'number',
                inputPlaceholder: 'New Amount',
                showCancelButton: true,
                confirmButtonText: 'Update'
            });
            if (newBal) await db.collection('users').doc(id).update({ balance: parseFloat(newBal) });
        }

        async function deleteUser(id) {
            const result = await Swal.fire({ title: 'Delete User?', text: "This cannot be undone!", icon: 'warning', showCancelButton: true, confirmButtonText: 'Yes, Delete' });
            if (result.isConfirmed) await db.collection('users').doc(id).delete();
        }
    </script>
</body>
</html>
