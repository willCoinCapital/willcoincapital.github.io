<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | willCoinCapital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-8">
    <nav class="flex justify-between items-center mb-12">
        <div class="font-black text-xl">WILLCOIN<span class="text-cyan-400">CAPITAL</span></div>
        <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-cyan-500 to-teal-500"></div>
    </nav>

    <h1 class="text-3xl font-extrabold mb-2">Welcome Back, Investor</h1>
    <p class="text-gray-500 text-sm mb-8">Your portfolio is currently synchronizing with the blockchain.</p>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="glass p-8 rounded-3xl">
            <h3 class="text-gray-400 text-[10px] font-black uppercase tracking-widest mb-2">Total Balance</h3>
            <div class="text-4xl font-bold">$0.00</div>
        </div>
        <div class="glass p-8 rounded-3xl">
            <h3 class="text-gray-400 text-[10px] font-black uppercase tracking-widest mb-2">Active Trade</h3>
            <div class="text-cyan-400 font-bold uppercase">Pending...</div>
        </div>
    </div>
</body>
</html>
