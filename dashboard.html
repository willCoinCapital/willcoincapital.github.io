<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | willCoinCapital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background:#000; font-family:'Plus Jakarta Sans',sans-serif; color: white; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border:1px solid rgba(255,255,255,0.08);}
        .floating-support { position: fixed; bottom: 30px; right: 25px; z-index: 500; background: #22d3ee; color: #000; width: 60px; height: 60px; border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 15px 30px rgba(34, 211, 238, 0.4); }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(15px); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        #notification-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 350px; }
        .toast { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-left: 4px solid #22d3ee; padding: 16px 20px; border-radius: 18px; display: flex; align-items: center; gap: 12px; animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-6 pb-32">
    <div id="notification-container"></div>
    
    <a href="https://t.me/willCoin_Capital" target="_blank" class="floating-support">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg>
    </a>

    <div id="depositModal" class="modal-overlay">
        <div class="glass w-full max-w-sm rounded-[32px] p-8 text-center">
            <h3 class="text-xl font-black uppercase mb-4 tracking-widest">Deposit</h3>
            <p class="text-[10px] text-gray-500 mb-4 uppercase">Send BTC to address below:</p>
            <div class="bg-black/40 border border-white/5 rounded-2xl p-4 mb-6">
                <p class="text-[11px] font-mono text-white break-all mb-3">Bc1qgf7ruqy6y8pkyzsspxq38j53puny0aprujph28</p>
                <button onclick="copyBTC()" class="w-full py-2 bg-white/5 rounded-xl text-[10px] font-black uppercase text-white">Copy Address</button>
            </div>
            <input type="number" id="depositAmt" placeholder="Enter Amount Sent (USD)" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-5 mb-4 outline-none font-bold text-white">
            <button onclick="handleDepositDone()" class="w-full py-4 bg-cyan-400 text-black rounded-2xl font-black uppercase text-[11px]">Submit Deposit</button>
            <button onclick="closeModals()" class="w-full py-3 text-gray-500 font-black uppercase text-[9px] mt-2">Cancel</button>
        </div>
    </div>

    <nav class="flex justify-between items-center mb-10">
        <h1 class="font-black text-xl tracking-tighter uppercase">WILLCOIN<span class="text-cyan-400">CAPITAL</span></h1>
        <button onclick="auth.signOut()" class="px-4 py-2 rounded-full border border-cyan-400/30 text-[10px] font-black text-cyan-400 uppercase">Logout</button>
    </nav>

    <div class="glass rounded-[40px] p-8 mb-6">
        <p class="text-gray-400 text-[10px] font-black uppercase mb-1 tracking-widest">Available Balance</p>
        <h2 id="balanceDisplay" class="text-6xl font-extrabold tracking-tighter mb-8">$100.00</h2>
        <div class="flex gap-4">
            <button onclick="openModal('depositModal')" class="flex-1 bg-cyan-400 text-black py-5 rounded-[24px] font-black text-xs uppercase">Deposit</button>
            <button class="flex-1 bg-white/5 border border-white/10 py-5 rounded-[24px] font-black text-xs uppercase">Withdraw</button>
        </div>
    </div>

    <div class="glass rounded-[40px] p-8 mb-6">
        <div class="flex justify-between items-center mb-8">
            <h3 class="font-black text-lg uppercase tracking-tight">Invest</h3>
            <span class="bg-cyan-400/10 text-cyan-400 text-[9px] px-3 py-1.5 rounded-full font-black">+ $100 BONUS APPLIED</span>
        </div>
        <div class="flex gap-3">
            <button class="flex-[2] py-6 bg-white text-black rounded-[24px] font-black uppercase text-xs">Start 7-Day Cycle</button>
            <a href="https://t.me/+KG_gSPf8AHhkYjIx" target="_blank" class="flex-1 py-6 bg-white/5 border border-white/10 text-white rounded-[24px] font-black uppercase text-[10px] text-center flex items-center justify-center">Enquiries</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyDsY7hDvNEDq_8SE0XcHrgLU5e6kQxpMPA", authDomain: "willcoincapital.firebaseapp.com", projectId: "willcoincapital", storageBucket: "willcoincapital.firebasestorage.app", messagingSenderId: "241566024834", appId: "1:241566024834:web:75e0d771ca7eb9a5a3a09b" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function notify(msg, type='success') {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = `toast`;
            toast.innerHTML = `<p class="text-[11px] font-black uppercase tracking-widest text-white">${msg}</p>`;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 3500);
        }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }
        function copyBTC() { navigator.clipboard.writeText('Bc1qgf7ruqy6y8pkyzsspxq38j53puny0aprujph28'); notify("Address Copied"); }
        
        async function handleDepositDone() {
            const amt = document.getElementById('depositAmt').value;
            if(!amt) return notify("Enter Amount", "error");
            await db.collection("users").doc(auth.currentUser.uid).collection("transactions").add({
                type: "Deposit Pending", amount: parseFloat(amt), status: "pending", createdAt: new Date().getTime()
            });
            notify("Deposit Logged!");
            closeModals();
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                const userRef = db.collection("users").doc(user.uid);
                userRef.onSnapshot(doc => {
                    let bal = doc.exists ? doc.data().balance : 100.00;
                    if(!doc.exists) userRef.set({ balance: 100.00 });
                    document.getElementById("balanceDisplay").innerText = "$" + bal.toFixed(2);
                });
            } else { window.location.href = "index.html"; }
        });
    </script>
</body>
</html>
