<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | willCoinCapital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background:#000; font-family:'Plus Jakarta Sans',sans-serif; color: white; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border:1px solid rgba(255,255,255,0.08);}
        
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            z-index: 1000; align-items: center; justify-content: center; padding: 20px;
        }

        .blink-pending { animation: blink 1.5s ease-in-out infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; color: #fbbf24; } 50% { opacity: 0.3; color: #f59e0b; } }

        .float-support {
            position: fixed; bottom: 25px; right: 25px; z-index: 999;
            background: #22d3ee; color: black; padding: 12px 20px;
            border-radius: 50px; font-weight: 900; font-size: 10px;
            letter-spacing: 1px; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 10px 20px rgba(34, 211, 238, 0.3); text-decoration: none;
        }

        /* DYNAMIC SLIDER */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: rgba(255,255,255,0.1); border-radius: 10px; }
        input[type=range]::-webkit-slider-thumb { height: 22px; width: 22px; border-radius: 50%; background: #ffffff; cursor: pointer; -webkit-appearance: none; margin-top: -8px; border: 2px solid #22d3ee; transition: border-color 0.3s; }
    </style>
</head>
<body class="p-6 pb-24">

    <div id="withdrawModal" class="modal-overlay">
        <div class="glass w-full max-w-sm rounded-[32px] p-8">
            <h3 class="text-xl font-black uppercase mb-2">Withdraw Funds</h3>
            <p class="text-[10px] text-gray-500 font-bold uppercase mb-6">Source: Available Balance</p>
            <div class="space-y-4">
                <input type="number" id="withdrawAmount" placeholder="Amount (USD)" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-5 outline-none font-bold text-cyan-400">
                <input type="text" id="withdrawWallet" placeholder="Bitcoin Wallet Address" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-5 outline-none font-mono text-xs">
                <button onclick="processWithdrawal()" class="w-full py-4 bg-white text-black rounded-2xl font-black uppercase text-[11px] mt-2">Submit Request</button>
                <button onclick="closeModals()" class="w-full py-2 text-gray-500 font-black uppercase text-[9px]">Cancel</button>
            </div>
        </div>
    </div>

    <div id="depositModal" class="modal-overlay">
        <div class="glass w-full max-w-sm rounded-[32px] p-8 text-center">
            <h3 class="text-xl font-black uppercase mb-4">Bitcoin Deposit</h3>
            <div class="bg-black/40 border border-white/5 rounded-2xl p-4 mb-6">
                <p class="text-[11px] font-mono text-gray-400 break-all mb-3">Bc1qgf7ruqy6y8pkyzsspxq38j53puny0aprujph28</p>
                <button onclick="navigator.clipboard.writeText('Bc1qgf7ruqy6y8pkyzsspxq38j53puny0aprujph28');alert('Copied!')" class="w-full py-2 bg-white/5 rounded-xl text-[10px] font-black uppercase tracking-widest">Copy Address</button>
            </div>
            <button onclick="handleDone()" class="w-full py-4 bg-cyan-400 text-black rounded-2xl font-black uppercase text-[11px]">DONE</button>
            <button onclick="closeModals()" class="w-full py-3 text-gray-500 font-black uppercase text-[9px] mt-2">Cancel</button>
        </div>
    </div>

    <a href="https://t.me/willCoin_Capital" target="_blank" class="float-support">Support</a>

    <nav class="flex justify-between items-center mb-10">
        <h1 class="font-black text-xl tracking-tighter uppercase">WILLCOIN<span class="text-cyan-400">CAPITAL</span></h1>
        <button onclick="auth.signOut()" class="px-4 py-2 rounded-full border border-cyan-400/30 text-[10px] font-black text-cyan-400 uppercase">Logout</button>
    </nav>

    <div class="glass rounded-[40px] p-8 mb-6">
        <p class="text-gray-400 text-[10px] font-black uppercase mb-1">Available Balance</p>
        <h2 id="balanceDisplay" class="text-6xl font-extrabold tracking-tighter mb-8">$100.00</h2>
        <div class="flex gap-4">
            <button onclick="openModal('depositModal')" class="flex-1 bg-cyan-400 text-black py-5 rounded-[24px] font-black text-xs uppercase">Deposit</button>
            <button onclick="openModal('withdrawModal')" class="flex-1 bg-white/5 border border-white/10 py-5 rounded-[24px] font-black text-xs uppercase">Withdraw</button>
        </div>
    </div>

    <div class="glass rounded-[40px] p-8 mb-6">
        <div class="flex justify-between items-center mb-8">
            <h3 class="font-black text-lg uppercase">Invest</h3>
            <span id="bonusTag" class="bg-cyan-400/10 text-cyan-400 text-[9px] px-3 py-1.5 rounded-full font-black">+ $100 BONUS APPLIED</span>
        </div>
        <div class="space-y-6">
            <div class="flex justify-between mb-1">
                <p class="text-[10px] text-gray-500 font-black uppercase">Amount: $<span id="sliderVal">500</span></p>
            </div>
            <input type="range" id="investSlider" min="500" max="20000" step="500" value="500" oninput="updateInvest(this.value)">
            <div class="bg-cyan-400/5 border border-cyan-400/10 rounded-[24px] p-6 flex justify-between items-center" id="totalPowerCard">
                <p class="text-[10px] text-gray-400 font-black uppercase">Total Power:</p>
                <p class="text-xl font-black text-cyan-400" id="powerDisplay">$<span id="totalPower">600.00</span></p>
            </div>
            <button onclick="processInvestment()" class="w-full py-6 bg-white text-black rounded-[24px] font-black uppercase text-xs">Start 7-Day Cycle</button>
        </div>
    </div>

    <div class="glass rounded-[40px] p-8">
        <h3 class="font-black text-lg uppercase mb-6">History</h3>
        <div id="txHistory" class="space-y-6"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDsY7hDvNEDq_8SE0XcHrgLU5e6kQxpMPA",
            authDomain: "willcoincapital.firebaseapp.com",
            projectId: "willcoincapital",
            storageBucket: "willcoincapital.firebasestorage.app",
            messagingSenderId: "241566024834",
            appId: "1:241566024834:web:75e0d771ca7eb9a5a3a09b"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentBalance = 100.00;

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }

        function updateInvest(val) {
            document.getElementById('sliderVal').innerText = parseFloat(val).toLocaleString();
            document.getElementById('totalPower').innerText = (parseFloat(val) + 100).toFixed(2);
            const percent = (val - 500) / (20000 - 500) * 100;
            const color = percent > 50 ? "#fbbf24" : "#22d3ee";
            const slider = document.getElementById('investSlider');
            slider.style.background = `linear-gradient(90deg, ${color} ${percent}%, rgba(255,255,255,0.1) ${percent}%)`;
            slider.style.borderColor = color;
            document.getElementById('powerDisplay').style.color = color;
            document.getElementById('bonusTag').style.color = color;
        }

        async function processInvestment() {
            const amount = 500; // Simplified for this example
            if (currentBalance < amount) return alert("Insufficient Balance");
            await db.collection("users").doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amount) });
            await db.collection("users").doc(auth.currentUser.uid).collection("transactions").add({
                type: "7-Day Cycle Started", amount: amount, status: "active", date: "MAR 2026", createdAt: new Date().getTime()
            });
            alert("Investment Started!");
        }

        async function processWithdrawal() {
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            const wallet = document.getElementById('withdrawWallet').value;
            if (amount > currentBalance) return alert("Insufficient Balance");
            if (wallet.length < 10) return alert("Invalid Wallet");
            
            await db.collection("users").doc(auth.currentUser.uid).collection("transactions").add({
                type: "Withdrawal Pending", amount: amount, wallet: wallet, status: "pending", date: "MAR 2026", createdAt: new Date().getTime()
            });
            await db.collection("users").doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amount) });
            alert("Withdrawal Logged.");
            closeModals();
        }

        function handleDone() {
            const amt = prompt("BTC Value in USD:");
            if (amt) {
                db.collection("users").doc(auth.currentUser.uid).collection("transactions").add({
                    type: "Deposit Pending", amount: parseFloat(amt), status: "pending", date: "MAR 2026", createdAt: new Date().getTime()
                });
                closeModals();
            }
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("users").doc(user.uid);
                userRef.onSnapshot(doc => {
                    // CRITICAL FIX: Ensure $100 shows if balance is 0 or doesn't exist
                    if (doc.exists && doc.data().balance !== undefined) {
                        currentBalance = doc.data().balance;
                        // Force 100 if they are an existing user with no activity/0 balance
                        if(currentBalance <= 0) {
                            currentBalance = 100.00;
                            userRef.set({ balance: 100.00 }, { merge: true });
                        }
                    } else {
                        userRef.set({ balance: 100.00 }, { merge: true });
                        currentBalance = 100.00;
                    }
                    document.getElementById("balanceDisplay").innerText = "$" + currentBalance.toLocaleString(undefined, {minimumFractionDigits: 2});
                });

                db.collection("users").doc(user.uid).collection("transactions").orderBy("createdAt", "desc").onSnapshot(snap => {
                    const box = document.getElementById('txHistory');
                    box.innerHTML = "";
                    snap.forEach(d => {
                        const tx = d.data();
                        const isP = tx.status === 'pending';
                        box.innerHTML += `<div class="flex justify-between items-center border-b border-white/5 pb-3"><div><p class="font-bold text-sm">${tx.type}</p><p class="${isP ? 'blink-pending' : 'text-gray-500'} text-[9px] uppercase font-black">${isP ? 'Verifying...' : tx.date}</p></div><p class="font-black text-sm">$${tx.amount.toLocaleString()}</p></div>`;
                    });
                    box.innerHTML += `<div class="flex justify-between items-center pt-2"><div><p class="font-bold text-sm">Signup Bonus</p><p class="text-gray-500 text-[9px] font-black uppercase">MAR 2026</p></div><p class="text-cyan-400 font-black text-sm">+$100.00</p></div>`;
                });
            } else { location.href = "index.html"; }
        });
    </script>
</body>
</html>
