<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | willCoinCapital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background:#000; font-family:'Plus Jakarta Sans',sans-serif; color: white; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border:1px solid rgba(255,255,255,0.08);}
        
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.92); backdrop-filter: blur(15px);
            z-index: 1000; align-items: center; justify-content: center; padding: 20px;
        }

        #notification-container {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 9999; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 350px;
        }

        .toast {
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-left: 4px solid #22d3ee;
            padding: 16px 20px; border-radius: 18px;
            display: flex; align-items: center; gap: 12px;
            animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .toast.error { border-left-color: #ef4444; }
        .toast.success { border-left-color: #10b981; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        .blink-pending { animation: blink 1.5s ease-in-out infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; color: #fbbf24; } 50% { opacity: 0.3; color: #f59e0b; } }

        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: rgba(255,255,255,0.1); border-radius: 10px; }
        input[type=range]::-webkit-slider-thumb { 
            height: 24px; width: 24px; border-radius: 50%; background: #ffffff; 
            cursor: pointer; -webkit-appearance: none; margin-top: -8px; 
            border: 2px solid #22d3ee; box-shadow: 0 0 15px rgba(34, 211, 238, 0.3);
        }
    </style>
</head>
<body class="p-6 pb-24">

    <div id="notification-container"></div>

    <div id="withdrawModal" class="modal-overlay">
        <div class="glass w-full max-w-sm rounded-[32px] p-8">
            <h3 class="text-xl font-black uppercase mb-2">Withdraw Funds</h3>
            <p class="text-[10px] text-gray-500 font-bold uppercase mb-6 tracking-widest">Source: Available Balance</p>
            <div class="space-y-4">
                <input type="number" id="withdrawAmount" placeholder="Amount (USD)" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-5 outline-none font-bold text-cyan-400">
                <input type="text" id="withdrawWallet" placeholder="Bitcoin Wallet Address" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-5 outline-none font-mono text-xs text-white">
                <button onclick="processWithdrawal()" class="w-full py-4 bg-white text-black rounded-2xl font-black uppercase text-[11px] mt-2 tracking-widest">Submit Request</button>
                <button onclick="closeModals()" class="w-full py-2 text-gray-500 font-black uppercase text-[9px] tracking-widest">Cancel</button>
            </div>
        </div>
    </div>

    <div id="depositModal" class="modal-overlay">
        <div class="glass w-full max-w-sm rounded-[32px] p-8 text-center">
            <h3 class="text-xl font-black uppercase mb-4">Bitcoin Deposit</h3>
            <div class="bg-black/40 border border-white/5 rounded-2xl p-4 mb-6">
                <p class="text-[11px] font-mono text-gray-400 break-all mb-3 text-white">Bc1qgf7ruqy6y8pkyzsspxq38j53puny0aprujph28</p>
                <button onclick="copyBTC()" class="w-full py-2 bg-white/5 rounded-xl text-[10px] font-black uppercase tracking-widest">Copy Address</button>
            </div>
            <button onclick="handleDepositDone()" class="w-full py-4 bg-cyan-400 text-black rounded-2xl font-black uppercase text-[11px] tracking-widest">DONE</button>
            <button onclick="closeModals()" class="w-full py-3 text-gray-500 font-black uppercase text-[9px] mt-2 tracking-widest">Cancel</button>
        </div>
    </div>

    <nav class="flex justify-between items-center mb-10">
        <h1 class="font-black text-xl tracking-tighter uppercase">WILLCOIN<span class="text-cyan-400">CAPITAL</span></h1>
        <button onclick="auth.signOut()" class="px-4 py-2 rounded-full border border-cyan-400/30 text-[10px] font-black text-cyan-400 uppercase tracking-widest">Logout</button>
    </nav>

    <div class="glass rounded-[40px] p-8 mb-6">
        <p class="text-gray-400 text-[10px] font-black uppercase mb-1 tracking-widest">Available Balance</p>
        <h2 id="balanceDisplay" class="text-6xl font-extrabold tracking-tighter mb-8">$100.00</h2>
        <div class="flex gap-4">
            <button onclick="openModal('depositModal')" class="flex-1 bg-cyan-400 text-black py-5 rounded-[24px] font-black text-xs uppercase tracking-widest">Deposit</button>
            <button onclick="openModal('withdrawModal')" class="flex-1 bg-white/5 border border-white/10 py-5 rounded-[24px] font-black text-xs uppercase tracking-widest">Withdraw</button>
        </div>
    </div>

    <div class="glass rounded-[40px] p-8 mb-6">
        <div class="flex justify-between items-center mb-8">
            <h3 class="font-black text-lg uppercase tracking-tight">Invest</h3>
            <span id="bonusTag" class="bg-cyan-400/10 text-cyan-400 text-[9px] px-3 py-1.5 rounded-full font-black tracking-widest transition-all duration-300">+ $100 BONUS APPLIED</span>
        </div>
        <div class="space-y-6">
            <div class="flex justify-between mb-1">
                <p class="text-[10px] text-gray-500 font-black uppercase tracking-widest">Amount: $<span id="sliderVal">500</span></p>
            </div>
            <input type="range" id="investSlider" min="500" max="20000" step="500" value="500" oninput="updateInvest(this.value)">
            
            <div class="bg-white/5 border border-white/10 rounded-[24px] p-6">
                <p class="text-[9px] font-black text-gray-500 uppercase mb-2 tracking-widest">Manual Input</p>
                <input type="number" id="manualInvest" value="500" class="bg-transparent w-full text-2xl font-black outline-none text-white" oninput="updateInvest(this.value)">
            </div>

            <div class="bg-cyan-400/5 border border-cyan-400/10 rounded-[24px] p-6 flex justify-between items-center" id="powerCard">
                <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest">Total Power:</p>
                <p class="text-xl font-black text-cyan-400" id="powerDisplay">$<span id="totalPower">600.00</span></p>
            </div>

            <div class="flex gap-3">
                <button onclick="processInvestment()" class="flex-[2] py-6 bg-white text-black rounded-[24px] font-black uppercase text-xs tracking-widest">Start 7-Day Cycle</button>
                <a href="https://t.me/+KG_gSPf8AHhkYjIx" target="_blank" class="flex-1 py-6 bg-white/5 border border-white/10 text-white rounded-[24px] font-black uppercase text-[10px] text-center flex items-center justify-center tracking-widest">Enquiries</a>
            </div>
        </div>
    </div>

    <div class="glass rounded-[40px] p-8">
        <h3 class="font-black text-lg uppercase mb-6 tracking-tight">History</h3>
        <div id="txHistory" class="space-y-6"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDsY7hDvNEDq_8SE0XcHrgLU5e6kQxpMPA",
            authDomain: "willcoincapital.firebaseapp.com",
            projectId: "willcoincapital",
            storageBucket: "willcoincapital.firebasestorage.app",
            messagingSenderId: "241566024834",
            appId: "1:241566024834:web:75e0d771ca7eb9a5a3a09b"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentBalance = 100.00;

        function genTXID() { return 'WC-' + Math.random().toString(36).substring(2, 7).toUpperCase(); }

        function notify(message, type = 'info') {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<p class="text-[11px] font-black uppercase tracking-widest text-white">${message}</p>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }, 3500);
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }

        function copyBTC() {
            navigator.clipboard.writeText('Bc1qgf7ruqy6y8pkyzsspxq38j53puny0aprujph28');
            notify("Wallet Address Copied", "success");
        }

        function updateInvest(val) {
            const num = parseFloat(val) || 0;
            document.getElementById('sliderVal').innerText = num.toLocaleString();
            document.getElementById('investSlider').value = num;
            document.getElementById('manualInvest').value = num;
            document.getElementById('totalPower').innerText = (num + 100).toFixed(2);
            
            const percent = Math.min(Math.max((num - 500) / (20000 - 500) * 100, 0), 100);
            const color = percent > 50 ? "#fbbf24" : "#22d3ee";
            document.getElementById('investSlider').style.background = `linear-gradient(90deg, ${color} ${percent}%, rgba(255,255,255,0.1) ${percent}%)`;
            document.getElementById('powerDisplay').style.color = color;
            document.getElementById('bonusTag').style.color = color;
            document.getElementById('bonusTag').style.background = percent > 50 ? "rgba(251, 191, 36, 0.1)" : "rgba(34, 211, 238, 0.1)";
        }

        async function processWithdrawal() {
            const amt = parseFloat(document.getElementById('withdrawAmount').value);
            const wal = document.getElementById('withdrawWallet').value;
            if (amt > currentBalance) return notify("Insufficient balance", "error");
            if (wal.length < 26) return notify("Invalid BTC address", "error");

            const txid = genTXID();
            await db.collection("users").doc(auth.currentUser.uid).collection("transactions").add({
                type: "Withdrawal Pending", amount: amt, wallet: wal, status: "pending", txid: txid, date: "MAR 2026", createdAt: new Date().getTime()
            });
            await db.collection("users").doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            notify(`Withdrawal Logged: ${txid}`, "success");
            closeModals();
        }

        async function processInvestment() {
            const amt = parseFloat(document.getElementById('manualInvest').value);
            if (currentBalance < amt) return notify("Insufficient Balance", "error");
            
            const txid = genTXID();
            await db.collection("users").doc(auth.currentUser.uid).update({ balance: firebase.firestore.FieldValue.increment(-amt) });
            await db.collection("users").doc(auth.currentUser.uid).collection("transactions").add({
                type: "7-Day Cycle Active", amount: amt, status: "active", txid: txid, date: "MAR 2026", createdAt: new Date().getTime()
            });
            notify(`Cycle Active: ${txid}`, "success");
        }

        function handleDepositDone() {
            const amt = prompt("Enter total BTC value sent ($):");
            if (amt && !isNaN(amt)) {
                const txid = genTXID();
                db.collection("users").doc(auth.currentUser.uid).collection("transactions").add({
                    type: "Deposit Pending", amount: parseFloat(amt), status: "pending", txid: txid, date: "MAR 2026", createdAt: new Date().getTime()
                });
                notify(`Deposit Logged: ${txid}`, "success");
                closeModals();
            }
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection("users").doc(user.uid);
                userRef.onSnapshot(doc => {
                    if (doc.exists && doc.data().balance !== undefined) {
                        currentBalance = doc.data().balance;
                        if(currentBalance <= 0) {
                            currentBalance = 100.00;
                            userRef.set({ balance: 100.00 }, { merge: true });
                        }
                    } else {
                        userRef.set({ balance: 100.00 }, { merge: true });
                        currentBalance = 100.00;
                    }
                    document.getElementById("balanceDisplay").innerText = "$" + currentBalance.toLocaleString(undefined, {minimumFractionDigits: 2});
                });

                db.collection("users").doc(user.uid).collection("transactions").orderBy("createdAt", "desc").onSnapshot(snap => {
                    const box = document.getElementById('txHistory');
                    box.innerHTML = "";
                    snap.forEach(d => {
                        const tx = d.data();
                        const isP = tx.status === 'pending';
                        box.innerHTML += `
                            <div class="flex justify-between items-start border-b border-white/5 pb-4">
                                <div>
                                    <p class="font-bold text-sm text-white">${tx.type}</p>
                                    <p class="text-[9px] font-black text-gray-500 uppercase tracking-widest">${tx.txid || 'N/A'} • ${isP ? 'Verifying' : tx.date}</p>
                                </div>
                                <p class="font-black text-sm">$${tx.amount.toLocaleString()}</p>
                            </div>`;
                    });
                    box.innerHTML += `<div class="flex justify-between items-center pt-2"><div><p class="font-bold text-sm text-white">Signup Bonus</p><p class="text-gray-500 text-[9px] font-black uppercase tracking-widest">PROMO • MAR 2026</p></div><p class="text-cyan-400 font-black text-sm">+$100.00</p></div>`;
                });
            } else { location.href = "index.html"; }
        });
        
        // Final Init
        updateInvest(500);
    </script>
</body>
</html>
