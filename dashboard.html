<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | willCoinCapital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background:#000; font-family:'Plus Jakarta Sans',sans-serif; color: white; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border:1px solid rgba(255,255,255,0.08);}
        .cycle-card { background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .text-gold { color: #F59E0B; text-shadow: 0 0 10px rgba(245, 158, 11, 0.3); }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(15px); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        #notification-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 350px; }
        .toast { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-left: 4px solid #22d3ee; padding: 16px 20px; border-radius: 18px; display: flex; align-items: center; animation: slideDown 0.4s forwards; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* UPDATED: LONGER SLIDER STYLING */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; margin: 35px 0; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; }
        input[type=range]::-webkit-slider-thumb { height: 28px; width: 28px; border-radius: 50%; background: #22d3ee; cursor: pointer; -webkit-appearance: none; margin-top: -11px; border: 4px solid #000; box-shadow: 0 0 15px rgba(34, 211, 238, 0.4); }

        /* NEW: 4-LINE HISTORY COLLAPSE */
        #historyPreviewBox { max-height: 340px; overflow: hidden; transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        #historyPreviewBox.expanded { max-height: 2000px; }

        /* NEW: FLOATING SUPPORT BUTTON */
        .support-fab { position: fixed; bottom: 30px; right: 30px; background: #22d3ee; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; transition: transform 0.2s; }
        .support-fab:active { transform: scale(0.9); }

        .hidden { display: none !important; }
        .btn-locked { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.1); pointer-events: none; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-6 pb-32">
    <div id="notification-container"></div>

    <a href="https://t.me/your_support_link" target="_blank" class="support-fab">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
    </a>

    <div id="withdrawModal" class="modal-overlay">
        <div class="glass w-full max-w-sm rounded-[32px] p-8">
            <h3 class="text-xl font-black uppercase mb-6 tracking-widest text-center text-white">Withdrawal</h3>
            <div class="space-y-4 mb-6">
                <input type="text" id="drawWallet" placeholder="Wallet Address" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-5 outline-none text-white font-bold">
                <input type="number" id="drawAmount" placeholder="Amount USD" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-5 outline-none text-white font-bold">
            </div>
            <button onclick="handleWithdrawal()" class="w-full py-4 bg-white text-black rounded-2xl font-black uppercase text-[11px] tracking-widest">REQUEST WITHDRAWAL</button>
            <button onclick="closeModal('withdrawModal')" class="w-full py-3 text-gray-500 font-black uppercase text-[9px] mt-2 w-full text-center">Cancel</button>
        </div>
    </div>

    <div id="historyDetailModal" class="modal-overlay">
        <div class="glass w-full max-w-sm rounded-[32px] p-8">
            <h3 class="text-xl font-black uppercase mb-6 tracking-widest text-center text-white">Transaction Detail</h3>
            <div id="historyDetailContent" class="space-y-4 mb-8"></div>
            <button onclick="closeModal('historyDetailModal')" class="w-full py-4 bg-white text-black rounded-2xl font-black uppercase text-[11px] tracking-widest">Close</button>
        </div>
    </div>

    <div id="depositModal" class="modal-overlay">
        <div class="glass w-full max-w-sm rounded-[32px] p-8 text-center">
            <h3 class="text-xl font-black uppercase mb-4 tracking-widest text-white">Deposit BTC</h3>
            <div class="bg-black/40 border border-white/5 rounded-2xl p-4 mb-6">
                <p id="btcAddr" class="text-[11px] font-mono text-gray-400 break-all mb-3">Bc1qgf7ruqy6y8pkyzsspxq38j53puny0aprujph28</p>
                <button onclick="copyBTC()" class="w-full py-2 bg-white/5 rounded-xl text-[10px] font-black uppercase tracking-widest text-white">Copy Address</button>
            </div>
            <input type="number" id="depositInputAmt" placeholder="0.00" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-5 outline-none text-white font-bold mb-6">
            <button onclick="handleDepositSubmit()" class="w-full py-4 bg-cyan-400 text-black rounded-2xl font-black uppercase text-[11px] tracking-widest">I HAVE SENT FUNDS</button>
            <button onclick="closeModal('depositModal')" class="w-full py-3 text-gray-500 font-black uppercase text-[9px] mt-2">Close</button>
        </div>
    </div>

    <div id="dashboardView">
        <nav class="flex justify-between items-center mb-10">
            <h1 class="font-black text-xl tracking-tighter uppercase text-white">WILLCOIN<span class="text-cyan-400">CAPITAL</span></h1>
            <button onclick="handleLogout()" class="px-4 py-2 rounded-full border border-cyan-400/30 text-[10px] font-black text-cyan-400 uppercase tracking-widest">Logout</button>
        </nav>

        <div class="glass rounded-[40px] p-8 mb-6 text-center">
            <p class="text-gray-400 text-[10px] font-black uppercase mb-1 tracking-widest">Available Balance</p>
            <h2 id="balanceDisplay" class="text-6xl font-extrabold tracking-tighter mb-8 text-white">$0.00</h2>
            <div class="flex gap-4">
                <button onclick="openModal('depositModal')" class="flex-1 bg-cyan-400 text-black py-5 rounded-[24px] font-black text-xs uppercase tracking-widest">Deposit</button>
                <button onclick="openModal('withdrawModal')" class="flex-1 bg-white/5 border border-white/10 py-5 rounded-[24px] font-black text-xs uppercase tracking-widest text-white">Withdraw</button>
            </div>
        </div>

        <div class="glass rounded-[40px] p-8 mb-6">
            <h3 class="font-black text-[10px] uppercase tracking-widest text-white/30 mb-8">Invest</h3>
            <div class="space-y-6">
                <input type="range" id="investSlider" min="500" max="20000" step="500" value="500" oninput="updateInvest(this.value)">
                <div class="bg-black/30 border border-white/10 rounded-[28px] p-8 text-center">
                    <p class="text-[9px] font-black text-gray-500 uppercase mb-2 tracking-widest">Manual Amount</p>
                    <input type="number" id="manualInvest" value="500" class="bg-transparent w-full text-5xl font-black outline-none text-white text-center" oninput="updateInvest(this.value)">
                </div>
                <button id="startBtn" onclick="processInvestment()" class="w-full py-6 rounded-[24px] font-black uppercase text-xs tracking-widest transition-all btn-locked">Start 7-Day Cycle</button>
            </div>
        </div>

        <div class="glass rounded-[40px] p-8 mb-6">
            <h3 class="font-black text-[10px] uppercase tracking-widest text-white/30 mb-8">History</h3>
            <div id="historyPreviewBox" class="cursor-pointer" onclick="this.classList.toggle('expanded')">
                <div id="historyContainer" class="space-y-8">
                    </div>
            </div>
            <p class="text-[8px] font-black text-white/20 uppercase tracking-[0.2em] mt-8 text-center border-t border-white/5 pt-6">Tap box to expand full history</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDsY7hDvNEDq_8SE0XcHrgLU5e6kQxpMPA", authDomain: "willcoincapital.firebaseapp.com", projectId: "willcoincapital", storageBucket: "willcoincapital.firebasestorage.app", messagingSenderId: "241566024834", appId: "1:241566024834:web:75e0d771ca7eb9a5a3a09b" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();
        let currentBalance = 0; let userHistory = [];

        function notify(msg) {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = `toast`;
            toast.innerHTML = `<p class="text-[11px] font-black uppercase tracking-widest text-white">${msg}</p>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        auth.onAuthStateChanged(async (user) => {
            if (!user) { location.href = "index.html"; return; }
            db.collection("users").doc(user.uid).onSnapshot(doc => {
                const data = doc.data();
                if(!data) return;
                currentBalance = data.balance || 0;
                document.getElementById("balanceDisplay").innerText = "$" + currentBalance.toLocaleString();
                
                userHistory = data.history || [];
                const container = document.getElementById('historyContainer');
                const reversed = [...userHistory].reverse();
                
                container.innerHTML = reversed.map((item, idx) => {
                    const isSuccessful = item.status === "Successful";
                    return `
                        <div class="flex justify-between items-start py-1">
                            <div>
                                <p class="text-white font-bold text-[13px] mb-1">${item.type}</p>
                                <p class="text-[9px] text-gray-500 font-black uppercase tracking-widest">${item.id} • ${item.status}</p>
                            </div>
                            <p class="${isSuccessful ? 'text-green-400' : 'text-orange-400'} font-black text-sm">$${item.amount.toLocaleString()}</p>
                        </div>`;
                }).join('') || '<p class="text-gray-500 text-[10px] font-black uppercase">No transactions yet</p>';

                updateInvest(document.getElementById('manualInvest').value || 500);
            });
        });

        function updateInvest(val) {
            const num = parseFloat(val) || 0;
            const btn = document.getElementById('startBtn');
            document.getElementById('investSlider').value = num;
            document.getElementById('manualInvest').value = num;
            if (num >= 500 && currentBalance >= num) {
                btn.className = "w-full py-6 bg-white text-black rounded-[24px] font-black uppercase text-xs tracking-widest";
            } else {
                btn.className = "w-full py-6 rounded-[24px] font-black uppercase text-xs tracking-widest btn-locked";
            }
        }

        async function processInvestment() {
            const amt = parseFloat(document.getElementById('manualInvest').value);
            const userRef = db.collection("users").doc(auth.currentUser.uid);
            await userRef.update({ 
                balance: firebase.firestore.FieldValue.increment(-amt),
                activeCycle: { amount: amt, startTime: Date.now() },
                history: firebase.firestore.FieldValue.arrayUnion({
                    type: "7-Day Cycle Active",
                    amount: amt,
                    id: "WC-INV-" + Math.random().toString(36).substr(2, 4).toUpperCase(),
                    date: "MAR 2026",
                    status: "Successful"
                })
            });
            notify("Investment Successful");
        }

        // OTHER FUNCTIONS (Withdraw, Deposit, etc.)
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function handleLogout() { auth.signOut().then(() => { location.href = "index.html"; }); }
        function copyBTC() { navigator.clipboard.writeText("Bc1qgf7ruqy6y8pkyzsspxq38j53puny0aprujph28"); notify("COPIED"); }
    </script>
</body>
</html>
