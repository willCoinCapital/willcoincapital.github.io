<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | willCoinCapital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: white; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .ticker-glow { text-shadow: 0 0 10px rgba(34, 211, 238, 0.5); }
    </style>
</head>
<body class="p-6">
    <nav class="flex justify-between items-center mb-10">
        <div class="flex items-center">
            <div class="font-black text-xl tracking-tighter uppercase">WILLCOIN<span class="text-cyan-400">CAPITAL</span></div>
            <a href="index.html" class="ml-4 text-[10px] font-black uppercase text-gray-500 hover:text-cyan-400 transition-colors">Logout</a>
        </div>
        <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-cyan-500 to-teal-500 shadow-[0_0_15px_rgba(34,211,238,0.3)]"></div>
    </nav>

    <h1 class="text-3xl font-extrabold tracking-tight mb-2">Welcome Back, Investor</h1>
    <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest mb-8">Your portfolio is currently synchronizing with the blockchain.</p>

    <div class="space-y-4 mb-6">
        <div class="glass p-8 rounded-3xl">
            <h3 class="text-gray-500 text-[10px] font-black uppercase tracking-widest mb-2">Total Balance</h3>
            <div class="text-5xl font-bold tracking-tighter">$0.00</div>
        </div>

        <div class="glass p-6 rounded-3xl flex justify-between items-center">
            <div>
                <h3 class="text-gray-400 text-[10px] font-black uppercase tracking-widest mb-1">Active Trade</h3>
                <div class="text-cyan-400 font-bold text-sm tracking-widest uppercase animate-pulse">Pending...</div>
            </div>
            <div class="h-2 w-2 rounded-full bg-cyan-400 shadow-[0_0_8px_#22d3ee]"></div>
        </div>
    </div>

    <div class="glass p-5 rounded-3xl flex items-center justify-between">
        <div class="flex items-center gap-3">
            <img src="https://assets.coingecko.com/coins/images/1/small/bitcoin.png" class="w-6 h-6">
            <span class="text-[10px] font-black uppercase tracking-widest">BTC / USD</span>
        </div>
        <div id="btc-price" class="text-sm font-bold ticker-glow text-cyan-400">Loading...</div>
    </div>

    <script>
        async function updatePrice() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
                const data = await response.json();
                document.getElementById('btc-price').innerText = `$${data.bitcoin.usd.toLocaleString()}`;
            } catch (e) { document.getElementById('btc-price').innerText = "Live"; }
        }
        updatePrice(); setInterval(updatePrice, 30000);
    </script>
</body>
</html>
