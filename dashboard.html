<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | willCoinCapital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background:#000; font-family:'Plus Jakarta Sans',sans-serif; color: white; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border:1px solid rgba(255,255,255,0.08);}
        .active-gradient { background: linear-gradient(135deg, rgba(34,211,238,0.1) 0%, rgba(0,0,0,0) 100%); border: 1px solid rgba(34,211,238,0.3); }
        
        #depositModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .blink-pending {
            animation: blink 1.5s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; color: #fbbf24; }
            50% { opacity: 0.3; color: #f59e0b; }
        }

        .float-support {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 999;
            background: #22d3ee;
            color: black;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 10px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 20px rgba(34, 211, 238, 0.3);
            text-decoration: none;
        }
    </style>
</head>
<body class="p-6 pb-24">

    <div id="depositModal">
        <div class="glass w-full max-w-sm rounded-[32px] p-8 border border-white/10 text-center">
            <div class="mb-6">
                <div class="w-16 h-16 bg-orange-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="#f7931a"><path d="M23.638 14.904c-1.602 6.43-8.113 10.34-14.542 8.736C2.67 22.05-1.244 15.525.362 9.105 1.962 2.67 8.471-1.24 14.914.364c6.421 1.591 10.321 8.117 8.724 14.54zM18.56 10.56c.293-1.954-1.195-3.005-3.23-3.706l.66-2.64-1.609-.4-.644 2.58c-.422-.106-.856-.207-1.29-.306l.65-2.604-1.61-.402-.66 2.646c-.35-.08-.691-.153-1.025-.23l.002-.01-2.22-.555-.427 1.715s1.195.273 1.17.29c.652.163.77.594.75 1.05l-.934 3.748c.056.014.129.035.21.067l-.21-.053-.572 2.3c-.08.198-.282.495-.738.38l-1.17-.292-.712 1.64 2.095.522c.39.097.772.2 1.15.295l-.67 2.69 1.61.401.663-2.662c.44.12.87.234 1.29.34l-.66 2.65 1.61.402.67-2.687c2.744.52 4.81.31 5.677-2.17.7-1.996-.035-3.146-1.475-3.897.8-.184 1.4-.71 1.562-1.797zm-2.793 3.918c-.497 2.0-3.864.92-4.955.648l.883-3.542c1.09.272 4.587.81 4.072 2.894zm.5-3.937c-.453 1.82-3.26.897-4.168.67l.802-3.215c.91.227 3.83.653 3.366 2.545z"/></svg>
                </div>
                <h3 class="text-xl font-black tracking-tighter uppercase">Bitcoin Deposit</h3>
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-1">Send BTC to address below</p>
            </div>

            <div class="bg-black/40 border border-white/5 rounded-2xl p-4 mb-6 text-center">
                <p id="walletAddr" class="text-[11px] font-mono text-gray-400 break-all mb-3">Bc1qgf7ruqy6y8pkyzsspxq38j53puny0aprujph28</p>
                <button onclick="copyAddress()" class="w-full py-2 bg-white/5 hover:bg-white/10 rounded-xl text-[10px] font-black uppercase tracking-widest">Copy Address</button>
            </div>

            <div class="space-y-3">
                <button onclick="handleDone()" class="w-full py-4 bg-cyan-400 text-black rounded-2xl font-black uppercase text-[11px] tracking-widest">DONE</button>
                <button onclick="closeModal()" class="w-full py-3 text-gray-500 font-black uppercase text-[9px] tracking-widest">Cancel</button>
            </div>
        </div>
    </div>

    <nav class="flex justify-between items-center mb-8">
        <h1 class="font-black text-xl tracking-tighter uppercase">WILLCOIN<span class="text-cyan-400">CAPITAL</span></h1>
        <button onclick="logoutUser()" class="px-4 py-2 rounded-full border border-cyan-400/30 text-[10px] font-black text-cyan-400 uppercase tracking-widest">Logout</button>
    </nav>

    <div class="glass rounded-[32px] p-7 mb-4">
        <p class="text-gray-400 text-[10px] font-black uppercase tracking-widest mb-1">Available Balance</p>
        <h2 id="balanceDisplay" class="text-5xl font-extrabold tracking-tighter">$0.00</h2>
        <div class="flex gap-3 mt-6">
            <button onclick="openModal()" class="flex-1 bg-cyan-400 text-black py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest">Deposit</button>
            <button class="flex-1 bg-white/5 border border-white/10 py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest">Withdraw</button>
        </div>
    </div>

    <div class="glass rounded-[32px] p-7">
        <h3 class="text-white font-black text-lg uppercase tracking-tighter mb-5">History</h3>
        <div class="space-y-4" id="txHistory">
            </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDsY7hDvNEDq_8SE0XcHrgLU5e6kQxpMPA",
            authDomain: "willcoincapital.firebaseapp.com",
            projectId: "willcoincapital",
            storageBucket: "willcoincapital.firebasestorage.app",
            messagingSenderId: "241566024834",
            appId: "1:241566024834:web:75e0d771ca7eb9a5a3a09b"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function openModal() { document.getElementById('depositModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('depositModal').style.display = 'none'; }
        function copyAddress() { navigator.clipboard.writeText("Bc1qgf7ruqy6y8pkyzsspxq38j53puny0aprujph28"); alert("Copied!"); }

        function handleDone() {
            const amt = prompt("Amount Sent ($):");
            if (amt && !isNaN(amt)) {
                const user = auth.currentUser;
                db.collection("users").doc(user.uid).collection("transactions").add({
                    type: "Deposit Pending",
                    amount: parseFloat(amt),
                    status: "pending",
                    date: "MAR 2026",
                    createdAt: new Date().getTime()
                }).then(() => {
                    closeModal();
                    alert("Logged. Awaiting Admin Approval.");
                });
            }
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                db.collection("users").doc(user.uid).onSnapshot(doc => {
                    if (doc.exists) document.getElementById("balanceDisplay").innerText = "$" + (doc.data().balance || 0).toLocaleString();
                });

                db.collection("users").doc(user.uid).collection("transactions").orderBy("createdAt", "desc").onSnapshot(snap => {
                    const box = document.getElementById('txHistory');
                    box.innerHTML = "";
                    snap.forEach(doc => {
                        const tx = doc.data();
                        const isPending = tx.status === 'pending';
                        box.innerHTML += `
                            <div class="flex justify-between items-center pb-4 border-b border-white/5">
                                <div><p class="text-white font-bold text-sm">${tx.type}</p><p class="${isPending ? 'blink-pending' : 'text-gray-500'} text-[9px] uppercase font-black">${isPending ? 'Verifying...' : tx.date}</p></div>
                                <p class="${isPending ? 'text-gray-500' : 'text-cyan-400'} font-black text-sm">$${tx.amount.toLocaleString()}</p>
                            </div>`;
                    });
                });
            } else { window.location.href = "index.html"; }
        });

        function logoutUser() { auth.signOut().then(() => location.href="index.html"); }
    </script>
</body>
</html>
