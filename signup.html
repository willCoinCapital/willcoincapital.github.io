<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>willCoin Capital | Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-black text-white flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-md bg-[#0a0a0a] border-2 border-[#1a1a1a] p-8 rounded-2xl text-center">
        <h1 class="text-2xl font-bold mb-6">WILLCOIN CAPITAL</h1>
        <input type="email" id="email" placeholder="Email" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded mb-4">
        <input type="password" id="password" placeholder="Password" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded mb-6">
        <button onclick="signUp()" class="w-full bg-cyan-400 text-black font-bold py-3 rounded">Create Account</button>
        <p id="msg" class="mt-4 text-sm"></p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDsY7hDvNEDq_8",
            authDomain: "willcoincapital.firebaseapp.com",
            projectId: "willcoincapital",
            storageBucket: "willcoincapital.appspot.com",
            messagingSenderId: "24156602",
            appId: "1:241566024834:web:7"
        };
        firebase.initializeApp(firebaseConfig);

        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');
            try {
                const user = await firebase.auth().createUserWithEmailAndPassword(email, password);
                await user.user.sendEmailVerification();
                msg.innerText = "Success! Check your email (and Junk folder).";
                msg.style.color = "green";
            } catch (e) {
                msg.innerText = "Error: " + e.message;
                msg.style.color = "red";
            }
        }
    </script>
</body>
</html>
