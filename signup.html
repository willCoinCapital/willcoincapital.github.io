<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>willCoin Capital | Gateway Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-black text-white flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-md bg-[#0a0a0a] border-2 border-[#1a1a1a] p-8 rounded-[2rem] shadow-[10px_10px_0px_#111]">
        <h1 class="text-3xl font-black italic tracking-tighter mb-2">WILLCOIN<span class="text-[#22d3ee]">CAPITAL</span></h1>
        <p class="text-gray-500 text-sm mb-8 font-medium">Initialize your secure gateway account.</p>

        <form id="signup-form" class="space-y-4">
            <input type="email" id="email" placeholder="Email Address" required 
                class="w-full bg-[#111] border border-[#222] p-4 rounded-xl focus:border-[#22d3ee] outline-none transition-all text-white">
            
            <input type="password" id="password" placeholder="Password" required 
                class="w-full bg-[#111] border border-[#222] p-4 rounded-xl focus:border-[#22d3ee] outline-none transition-all text-white">

            <button type="submit" id="submit-btn"
                class="w-full bg-[#22d3ee] text-black font-black uppercase py-4 rounded-xl hover:scale-[0.98] transition-transform active:bg-[#159eb3]">
                Initialize Account
            </button>
        </form>
        <p id="message" class="mt-6 text-xs text-center font-bold uppercase tracking-widest min-h-[20px]"></p>
    </div>

    <script>
        // Data pulled from your screenshot
        const firebaseConfig = {
            apiKey: "AIzaSyDsY7hDvNEDq_8",
            authDomain: "willcoincapital.firebaseapp.com",
            projectId: "willcoincapital",
            storageBucket: "willcoincapital.appspot.com",
            messagingSenderId: "24156602",
            appId: "1:241566024834:web:7",
            measurementId: "G-4VEL5JXYYL"
        };

        const BREVO_API_KEY = "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";

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const statusMsg = document.getElementById('message');
            const btn = document.getElementById('submit-btn');

            statusMsg.innerText = "Establishing Secure Link...";
            statusMsg.style.color = "#22d3ee";
            btn.disabled = true;

            try {
                // 1. Create the user
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                
                // 2. Generate custom verification link
                const actionCodeSettings = {
                    url: 'https://willcoincapital.github.io/dashboard.html', 
                    handleCodeInApp: true
                };
                const verificationLink = await auth.generateEmailVerificationLink(email, actionCodeSettings);

                // 3. Send professional email via Brevo API
                const response = await fetch('https://api.brevo.com/v3/smtp/email', {
                    method: 'POST',
                    headers: {
                        'accept': 'application/json',
                        'api-key': BREVO_API_KEY,
                        'content-type': 'application/json'
                    },
                    body: JSON.stringify({
                        sender: { name: "willCoin Capital", email: "support@willcoincapital.firebaseapp.com" },
                        to: [{ email: email }],
                        subject: "Verify Your Account | Secure Gateway Activation",
                        htmlContent: `
                            <div style="font-family:sans-serif;background-color:#000;color:#fff;padding:40px;text-align:center;">
                                <h1 style="letter-spacing:-2px;text-transform:uppercase;font-weight:900;margin-bottom:5px;">
                                    WILLCOIN<span style="color:#22d3ee;">CAPITAL</span>
                                </h1>
                                <div style="background:#0a0a0a;border:2px solid #22d3ee;padding:35px;border-radius:24px;max-width:360px;margin:0 auto;">
                                    <h2 style="font-size:18px;margin-bottom:10px;">Activate Access</h2>
                                    <p style="color:#9ca3af;font-size:13px;line-height:1.6;margin-bottom:30px;">
                                        Verify your identity to initialize your account and claim your <br>
                                        <b style="color:#22d3ee;">$100.00 Welcome Bonus</b>.
                                    </p>
                                    <a href="${verificationLink}" style="display:inline-block;background:#22d3ee;color:#000;padding:18px 35px;border-radius:14px;text-decoration:none;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:1px;">
                                        Verify Email Address
                                    </a>
                                </div>
                                <p style="color:#444;font-size:9px;margin-top:35px;">© 2026 willCoin Capital Global | Secure Encryption Active</p>
                            </div>`
                    })
                });

                if (response.ok) {
                    statusMsg.innerText = "SUCCESS: VERIFICATION SENT. CHECK PRIMARY INBOX.";
                    statusMsg.style.color = "#22c55e";
                }

            } catch (error) {
                statusMsg.innerText = "SYSTEM ERROR: " + error.message.toUpperCase();
                statusMsg.style.color = "#ef4444";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
