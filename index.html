<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WILLCOIN | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #0b0b0b; font-family: 'Plus Jakarta Sans', sans-serif; color: white; }
        .glass-card { background: #161616; border: 1px solid #222; border-radius: 28px; }
        
        /* THE LONGER SLIDER */
        #investSlider {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            appearance: none;
            outline: none;
            margin: 40px 0;
        }
        #investSlider::-webkit-slider-thumb {
            appearance: none;
            width: 26px;
            height: 26px;
            background: #22d3ee;
            border-radius: 50%;
            cursor: pointer;
            border: 4px solid #161616;
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.4);
        }

        /* 4-ITEM HISTORY PREVIEW */
        #historyList {
            max-height: 340px; /* Limits view to roughly 4 items */
            overflow: hidden;
            transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #historyList.expanded {
            max-height: 2000px; /* Shows full list when clicked */
            overflow-y: auto;
        }

        /* FLOATING SUPPORT BUTTON */
        .support-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #22d3ee;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 999;
            transition: transform 0.2s;
        }
        .support-btn:active { transform: scale(0.9); }

        /* ONE-INVESTMENT LOCKING */
        .locked-ui {
            opacity: 0.25;
            pointer-events: none;
            filter: blur(1px);
        }
    </style>
</head>
<body class="p-6 pb-32 max-w-lg mx-auto">

    <header class="flex justify-between items-center mb-10">
        <h1 class="text-2xl font-black tracking-tighter">WILLCOIN <span class="opacity-20">CONSOLE</span></h1>
        <div class="bg-red-500/10 text-red-500 text-[9px] font-black px-4 py-2 rounded-full uppercase tracking-widest border border-red-500/10">Lock</div>
    </header>

    <div class="glass-card p-8 mb-6 relative overflow-hidden">
        <div class="flex justify-between items-center mb-2">
            <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-white/30">Invest</h3>
            <span id="activeBadge" class="hidden text-[9px] font-black text-cyan-400 uppercase tracking-widest animate-pulse">● Active Cycle</span>
        </div>

        <div id="investUI">
            <input type="range" id="investSlider" min="500" max="10000" step="100" value="500" oninput="updateVal(this.value)">
            
            <div class="bg-black/40 border border-white/5 p-6 rounded-2xl mb-8 text-center">
                <p class="text-[8px] text-white/20 uppercase font-bold mb-2 tracking-widest">Manual Input (Min $500)</p>
                <input type="number" id="investManual" value="500" class="bg-transparent text-4xl font-black w-full text-center outline-none text-white" oninput="updateSlider(this.value)">
            </div>
            
            <button id="startBtn" onclick="initiateInvestment()" class="w-full bg-white text-black font-extrabold py-5 rounded-2xl text-xs uppercase tracking-[0.2em]">
                Start 7-Day Cycle
            </button>
        </div>
    </div>

    <div class="glass-card p-8">
        <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-white/30 mb-8">History</h3>
        
        <div id="historyList" class="divide-y divide-white/5 cursor-pointer" onclick="this.classList.toggle('expanded')">
            </div>

        <div class="mt-6 text-center border-t border-white/5 pt-6">
            <p class="text-[8px] font-black text-white/20 uppercase tracking-widest">Tap Box To View All</p>
        </div>
    </div>

    <a href="https://t.me/your_handle" target="_blank" class="support-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
    </a>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        // Your Firebase Config
        const firebaseConfig = { 
            apiKey: "AIzaSyDsY7hDvNEDq_8SE0XcHrgLU5e6kQxpMPA", 
            authDomain: "willcoincapital.firebaseapp.com", 
            projectId: "willcoincapital", 
            storageBucket: "willcoincapital.firebasestorage.app", 
            messagingSenderId: "241566024834", 
            appId: "1:241566024834:web:75e0d771ca7eb9a5a3a09b" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const userEmail = "fatugots@gmail.com"; // Dynamic in your real app

        function updateVal(v) { document.getElementById('investManual').value = v; }
        function updateSlider(v) { document.getElementById('investSlider').value = v; }

        // REAL-TIME DATA SYNC
        db.collection('users').where("email", "==", userEmail).onSnapshot(snap => {
            snap.forEach(doc => {
                const data = doc.data();
                const hContainer = document.getElementById('historyList');
                const investUI = document.getElementById('investUI');
                const badge = document.getElementById('activeBadge');
                const startBtn = document.getElementById('startBtn');

                // 1. ONE-INVESTMENT LOCKING LOGIC
                if (data.activeCycle && data.activeCycle !== null) {
                    investUI.classList.add('locked-ui');
                    badge.classList.remove('hidden');
                    startBtn.innerText = "Cycle In Progress";
                } else {
                    investUI.classList.remove('locked-ui');
                    badge.classList.add('hidden');
                    startBtn.innerText = "Start 7-Day Cycle";
                }

                // 2. HISTORY RENDERING
                hContainer.innerHTML = "";
                if (data.history) {
                    data.history.sort((a,b) => b.date - a.date).forEach(item => {
                        const isSuccess = item.status === "Successful" || item.status === "Successful";
                        hContainer.innerHTML += `
                            <div class="py-5 flex justify-between items-center">
                                <div>
                                    <p class="text-[11px] font-black uppercase tracking-tight">${item.type || 'Deposit'}</p>
                                    <p class="text-[8px] text-white/20 font-bold mt-1 uppercase">${item.status} • ${item.id || 'WC-TX'}</p>
                                </div>
                                <p class="text-xl font-black ${isSuccess ? 'text-cyan-400' : 'text-orange-400'}">$${item.amount.toLocaleString()}</p>
                            </div>
                        `;
                    });
                }
            });
        });

        async function initiateInvestment() {
            const amount = document.getElementById('investManual').value;
            // Add your Firestore logic here to set activeCycle to the amount
            alert("Submitting Investment Request for $" + amount);
        }
    </script>
</body>
</html>
