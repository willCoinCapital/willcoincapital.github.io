<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>willCoinCapital | Live Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="bg-[#020817] text-white">

    <nav class="flex items-center justify-between px-8 py-6 max-w-7xl mx-auto">
        <div class="flex items-center gap-2 text-2xl font-bold">
            <div class="w-8 h-8 bg-cyan-400 rounded flex items-center justify-center text-black italic font-black">W</div>
            <span>WCC</span>
        </div>
        <div class="flex gap-4">
            <button class="px-5 py-2 text-sm font-bold bg-cyan-400 text-black rounded-lg uppercase">Sign Up</button>
        </div>
    </nav>

    <div class="ticker-wrap border-y border-white/5 bg-white/5 py-3">
        <div class="ticker-move" id="ticker-content">
            <span class="text-cyan-400">Fetching Live Market Data...</span>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-8 py-16 grid lg:grid-cols-2 gap-12 items-center">
        <div>
            <h1 class="text-6xl font-black mb-6 tracking-tighter">
                Maximize Your <br> Crypto Potential with <br>
                <span class="text-cyan-400">willCoinCapital.</span>
            </h1>
            <button class="px-10 py-5 bg-cyan-400 text-black font-black rounded-xl uppercase">Get Started Now</button>
        </div>

        <div class="glass-card p-10 rounded-3xl">
            <h2 class="text-2xl font-black italic text-cyan-400 uppercase mb-6">Exclusive 50% Bonus</h2>
            <input type="number" id="depositInput" value="1000" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 mb-4 text-2xl font-bold outline-none">
            <input type="range" id="depositSlider" min="100" max="10000" step="100" value="1000" class="w-full mb-8 accent-cyan-400">
            <div class="grid grid-cols-3 gap-4 pt-4 border-t border-white/10 text-center">
                <div><p class="text-[10px] text-gray-500 font-bold uppercase">Invest</p><p id="displayInvest" class="font-bold">$1,000</p></div>
                <div><p class="text-[10px] text-cyan-400 font-bold uppercase">Bonus</p><p id="displayBonus" class="font-bold text-cyan-400">$500</p></div>
                <div><p class="text-[10px] text-gray-500 font-bold uppercase">Total</p><p id="displayTotal" class="font-bold">$1,500</p></div>
            </div>
        </div>
    </main>

    <section class="max-w-7xl mx-auto px-8 py-20">
        <h3 class="text-sm font-bold text-gray-500 uppercase tracking-[0.3em] mb-10">Dashboard Preview</h3>
        <div class="grid md:grid-cols-3 gap-6">
            <div class="glass-card p-6 rounded-2xl border border-white/5">
                <p class="text-xs text-gray-400 mb-2">Total Balance</p>
                <h4 class="text-2xl font-bold mb-4">$45,280.00</h4>
                <div class="h-20 bg-gradient-to-r from-cyan-500/20 to-transparent rounded-lg border-l-2 border-cyan-400"></div>
            </div>
            <div class="glass-card p-6 rounded-2xl border border-white/5">
                <p class="text-xs text-gray-400 mb-2">Active Trades</p>
                <div class="flex justify-between items-end">
                    <h4 class="text-2xl font-bold">12</h4>
                    <span class="text-green-400 text-xs font-bold">+2.25% Today</span>
                </div>
                <div class="mt-4 flex gap-1 items-end h-12">
                    <div class="bg-cyan-400/40 w-full h-1/2 rounded-t"></div>
                    <div class="bg-cyan-400/40 w-full h-3/4 rounded-t"></div>
                    <div class="bg-cyan-400 w-full h-full rounded-t"></div>
                </div>
            </div>
            <div class="glass-card p-6 rounded-2xl border border-white/5">
                <p class="text-xs text-gray-400 mb-2">Bonus Progress</p>
                <div class="relative w-24 h-24 mx-auto mt-2">
                    <svg viewBox="0 0 36 36" class="w-full h-full">
                        <path class="stroke-gray-800" stroke-width="3" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path class="stroke-cyan-400" stroke-dasharray="75, 100" stroke-width="3" stroke-linecap="round" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    </svg>
                    <div class="absolute inset-0 flex items-center justify-center font-bold text-sm">75%</div>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
