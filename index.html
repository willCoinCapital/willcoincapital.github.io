<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>willCoinCapital | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; color: white; margin: 0; overflow: hidden; height: 100vh; }
        .view-hidden { display: none !important; }
        .btn-cyan { background: linear-gradient(to right, #14b8a6, #22d3ee); color: #000; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Dashboard Specific */
        .balance-card { background: linear-gradient(135deg, #14b8a6 0%, #083344 100%); border-radius: 32px; padding: 30px; position: relative; overflow: hidden; }
        .balance-card::after { content: ''; position: absolute; top: -50%; right: -50%; width: 200px; height: 200px; background: rgba(255,255,255,0.1); border-radius: 50%; filter: blur(40px); }
    </style>
</head>
<body class="relative">

    <div id="landingView" class="flex flex-col items-center justify-between py-16 px-10 h-screen w-full">
        <header class="text-center space-y-3">
            <div class="text-[26px] font-800 tracking-tight uppercase"><span class="text-white">WILLCOIN</span><span class="text-cyan-400">CAPITAL</span></div>
            <h1 class="text-[34px] font-800 leading-tight">Own Your Assets <br> <span class="text-cyan-400">Invest Your Assets</span></h1>
        </header>
        <div class="flex gap-4">
            <div class="glass w-32 h-32 rounded-3xl flex flex-col items-center justify-center">
                <span class="text-[10px] text-white/40 font-bold uppercase mb-2">btc</span>
                <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.svg?v=024" class="w-10 h-10">
            </div>
            <div class="glass w-32 h-32 rounded-3xl flex flex-col items-center justify-center">
                <span class="text-[10px] text-white/40 font-bold uppercase mb-2">eth</span>
                <img src="https://cryptologos.cc/logos/ethereum-eth-logo.svg?v=024" class="w-10 h-10">
            </div>
        </div>
        <div class="w-full max-w-sm space-y-4">
            <button onclick="openAuth('Create Account')" class="w-full py-4 rounded-2xl btn-cyan text-[11px] font-black uppercase tracking-widest">Create Account</button>
            <button onclick="openAuth('Login')" class="w-full text-center text-[10px] text-gray-500 font-bold uppercase">Already Have An Account? <span class="text-white ml-1">Log In</span></button>
        </div>
    </div>

    <div id="authView" class="fixed inset-0 z-50 flex items-center justify-center p-6 view-hidden bg-black">
        <div class="w-full max-w-xs text-center space-y-8">
            <h2 id="authTitle" class="text-cyan-400 text-lg font-black uppercase tracking-widest">Login</h2>
            <form id="authForm" class="space-y-4">
                <input type="hidden" name="access_key" value="YOUR_KEY_HERE">
                <input type="email" placeholder="EMAIL ADDRESS" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-[10px] font-bold text-white uppercase tracking-widest outline-none focus:border-cyan-500">
                <input type="password" placeholder="PASSWORD" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-[10px] font-bold text-white uppercase tracking-widest outline-none focus:border-cyan-500">
                <button type="submit" id="authSubmit" class="w-full py-5 btn-cyan rounded-2xl text-[11px] font-black uppercase tracking-widest shadow-lg shadow-cyan-500/20">Continue</button>
            </form>
        </div>
    </div>

    <div id="dashboardView" class="fixed inset-0 z-[100] bg-black p-6 view-hidden overflow-y-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">Welcome Back,</p>
                <h3 class="text-lg font-black uppercase">Investor</h3>
            </div>
            <div class="w-10 h-10 rounded-full border border-white/10 bg-white/5 flex items-center justify-center">
                <span class="text-cyan-400 text-xs font-black">WC</span>
            </div>
        </header>

        <div class="balance-card mb-8">
            <p class="text-white/70 text-[10px] font-bold uppercase tracking-widest mb-1">Total Assets Balance</p>
            <h2 class="text-3xl font-black tracking-tighter">$42,850.12</h2>
            <div class="mt-4 inline-flex items-center px-2 py-1 bg-white/20 rounded-lg text-[9px] font-bold text-white">
                +$1,240.50 (2.4%) Today
            </div>
        </div>

        <div class="space-y-4">
            <h4 class="text-[10px] font-black text-gray-500 uppercase tracking-widest px-1">My Portfolio</h4>
            
            <div class="glass p-4 rounded-3xl flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.svg?v=024" class="w-8 h-8">
                    <div>
                        <p class="font-black text-sm uppercase">Bitcoin</p>
                        <p class="text-[10px] text-gray-500 font-bold uppercase">0.45 BTC</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="font-black text-sm">$29,310.12</p>
                    <p class="text-[9px] text-cyan-400 font-bold uppercase">+4.2%</p>
                </div>
            </div>

            <div class="glass p-4 rounded-3xl flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <img src="https://cryptologos.cc/logos/ethereum-eth-logo.svg?v=024" class="w-8 h-8">
                    <div>
                        <p class="font-black text-sm uppercase">Ethereum</p>
                        <p class="text-[10px] text-gray-500 font-bold uppercase">4.20 ETH</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="font-black text-sm">$10,540.00</p>
                    <p class="text-[9px] text-red-400 font-bold uppercase">-1.2%</p>
                </div>
            </div>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 p-6">
            <div class="glass rounded-full px-8 py-4 flex justify-between items-center">
                <div class="text-cyan-400"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
                <div class="text-gray-600"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg></div>
                <div class="text-gray-600" onclick="logout()"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/></svg></div>
            </div>
        </nav>
    </div>

    <script>
        const states = { LANDING: 'landing', AUTH: 'auth', DASHBOARD: 'dashboard' };

        window.onload = () => {
            const savedState = localStorage.getItem('userState');
            if (savedState === states.DASHBOARD) showView('dashboardView');
            else if (savedState === states.AUTH) openAuth(localStorage.getItem('authTitle'));
        };

        function showView(viewId) {
            ['landingView', 'authView', 'dashboardView'].forEach(id => {
                document.getElementById(id).classList.add('view-hidden');
            });
            document.getElementById(viewId).classList.remove('view-hidden');
        }

        function openAuth(type) {
            showView('authView');
            document.getElementById('authTitle').innerText = type;
            localStorage.setItem('userState', states.AUTH);
            localStorage.setItem('authTitle', type);
        }

        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('authSubmit');
            btn.innerText = "SYNCHRONIZING...";
            
            // Mocking the success state after API submission
            setTimeout(() => {
                btn.innerText = "SUCCESS";
                setTimeout(() => {
                    localStorage.setItem('userState', states.DASHBOARD);
                    showView('dashboardView');
                }, 800);
            }, 1200);
        };

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
