<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>willCoin Capital | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #000; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: white; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .glass { 
            background: rgba(255,255,255,0.03); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.08);
        }
        #notification-container { 
            position: fixed; 
            top: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 9999; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            width: 90%; 
            max-width: 350px; 
        }
        .toast { 
            background: rgba(10, 10, 10, 0.9); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-left: 4px solid #ef4444; 
            padding: 16px 20px; 
            border-radius: 18px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.8); 
        }
        @keyframes slideDown { 
            from { opacity: 0; transform: translateY(-20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* Adjusted Layout Positioning */
        .header-section {
            margin-top: 35px; /* Pushed the header higher up */
            text-align: center;
        }
        .auth-container {
            margin-top: 55px; /* Lowered account details moderately */
            padding: 0 24px;
        }
    </style>
</head>
<body>
    <div id="notification-container"></div>

    <div class="header-section">
        <h1 class="font-black text-3xl tracking-tighter uppercase">WILLCOIN<span class="text-cyan-400">CAPITAL</span></h1>
        <p id="formTitle" class="text-gray-500 text-[10px] font-black uppercase tracking-[0.2em] mt-2">Secure Member Login</p>
    </div>

    <div class="auth-container w-full max-w-sm mx-auto">
        <div class="glass rounded-[40px] p-8 space-y-4">
            <input type="email" id="email" placeholder="EMAIL ADDRESS" class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-6 outline-none font-bold text-xs tracking-widest uppercase text-white">
            <input type="password" id="password" placeholder="PASSWORD" class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-6 outline-none font-bold text-xs tracking-widest uppercase text-white">
            <button id="mainBtn" onclick="handleAuth()" class="w-full py-6 bg-cyan-400 text-black rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-white transition-colors duration-300">Login</button>
            <button id="toggleBtn" onclick="toggleMode()" class="w-full py-2 text-gray-500 font-black uppercase text-[9px] tracking-widest">Create New Account</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDsY7hDvNEDq_8SE0XcHrgLU5e6kQxpMPA", 
            authDomain: "willcoincapital.firebaseapp.com", 
            projectId: "willcoincapital", 
            storageBucket: "willcoincapital.firebasestorage.app", 
            messagingSenderId: "241566024834", 
            appId: "1:241566024834:web:75e0d771ca7eb9a5a3a09b" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        let isLogin = true;

        function notify(message) {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = `toast`;
            toast.innerHTML = `<p class="text-[11px] font-black uppercase tracking-widest text-white">${message}</p>`;
            container.appendChild(toast);
            setTimeout(() => { 
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 500);
            }, 3500);
        }

        function toggleMode() { 
            isLogin = !isLogin; 
            document.getElementById('formTitle').innerText = isLogin ? "Secure Member Login" : "Create Account"; 
            document.getElementById('mainBtn').innerText = isLogin ? "Login" : "Sign Up"; 
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (!email || !password) return notify("Fill all fields");
            try {
                if (isLogin) { await auth.signInWithEmailAndPassword(email, password); }
                else { await auth.createUserWithEmailAndPassword(email, password); }
                window.location.href = "dashboard.html";
            } catch (error) { 
                let msg = error.message;
                if (error.code === 'auth/email-already-in-use') msg = "Email already registered";
                notify(msg); 
            }
        }
        auth.onAuthStateChanged(user => { if (user) window.location.href = "dashboard.html"; });
    </script>
</body>
</html>
