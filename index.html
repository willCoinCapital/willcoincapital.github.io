<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WillCoin Capital | Live Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --yellow: #f5d448; --dark: #0f1111; --glass: rgba(15, 17, 17, 0.95); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--yellow); font-family: 'Inter', sans-serif; color: var(--dark); }
        
        nav { display: flex; justify-content: space-between; padding: 25px 6%; align-items: center; }
        .logo { font-family: 'Archivo Black', sans-serif; font-size: 1.2rem; }
        
        .hero { display: flex; flex-wrap: wrap; padding: 40px 6%; align-items: center; gap: 40px; }
        .hero-text { flex: 1; min-width: 320px; }
        .hero-text h1 { font-family: 'Archivo Black', sans-serif; font-size: 3.5rem; line-height: 1; margin: 20px 0; }
        
        .glass-card { background: var(--glass); color: white; padding: 30px; border-radius: 30px; flex: 1; min-width: 350px; box-shadow: 0 40px 80px rgba(0,0,0,0.2); }
        .live-indicator { color: #4ade80; font-weight: 700; font-size: 0.8rem; margin-bottom: 15px; display: flex; align-items: center; gap: 5px; }
        .dot { height: 8px; width: 8px; background: #4ade80; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .market-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 40px 6%; }
        .coin-card { background: rgba(255,255,255,0.4); backdrop-filter: blur(10px); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.3); }
        .price { font-size: 2rem; font-weight: 800; margin: 10px 0; }
        .up { color: #1b8a5a; } .down { color: #e11d48; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">🏢 WILLCOIN CAPITAL</div>
        <div class="nav-links"><a>Home</a><a>Markets</a><a>Invest</a></div>
    </nav>

    <section class="hero">
        <div class="hero-text">
            <h1>Unlock Your Crypto Potential.</h1>
            <p>Institutional-grade management with real-time analytics.</p>
        </div>
        <div class="glass-card">
            <div class="live-indicator"><span class="dot"></span> LIVE BTC/USD MARKET</div>
            <div style="height: 250px;">
                <iframe src="https://s.tradingview.com/widgetembed/?symbol=BITSTAMP%3ABTCUSD&interval=D&theme=dark" width="100%" height="100%" frameborder="0"></iframe>
            </div>
        </div>
    </section>

    <div class="market-grid">
        <div class="coin-card">
            <b>Bitcoin BTC</b>
            <div class="price" id="btc-p">Loading...</div>
            <span id="btc-c">--</span>
        </div>
        <div class="coin-card">
            <b>Ethereum ETH</b>
            <div class="price" id="eth-p">Loading...</div>
            <span id="eth-c">--</span>
        </div>
    </div>

    <script>
        async function getLive() {
            const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd&include_24hr_change=true');
            const data = await res.json();
            
            document.getElementById('btc-p').innerText = '$' + data.bitcoin.usd.toLocaleString();
            document.getElementById('btc-c').innerText = data.bitcoin.usd_24h_change.toFixed(2) + '% 24h';
            document.getElementById('btc-c').className = data.bitcoin.usd_24h_change > 0 ? 'up' : 'down';

            document.getElementById('eth-p').innerText = '$' + data.ethereum.usd.toLocaleString();
            document.getElementById('eth-c').innerText = data.ethereum.usd_24h_change.toFixed(2) + '% 24h';
            document.getElementById('eth-c').className = data.ethereum.usd_24h_change > 0 ? 'up' : 'down';
        }
        getLive(); setInterval(getLive, 30000);
    </script>
</body>
</html>
